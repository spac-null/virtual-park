<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a12;font-family:'IBM Plex Mono',monospace;color:#d4d0c8}
canvas{display:block;cursor:crosshair}
.hud-panel{position:absolute;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#d4d0c8;font-family:'IBM Plex Mono',monospace;padding:10px 14px;font-size:13px;pointer-events:none;transition:opacity 0.4s}
#gem-counter{top:16px;left:16px;z-index:10}
#gem-counter .gem-slots{display:flex;gap:4px;margin-top:4px}
#gem-counter .gem-slot{width:10px;height:10px;border-radius:2px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05)}
#gem-counter .gem-slot.collected{background:#e8c547;border-color:#e8c547;box-shadow:0 0 6px rgba(232,197,71,0.5)}
#player-info{top:70px;left:16px;z-index:10;display:flex;align-items:center;gap:8px}
#player-info .color-swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,0.2)}
#live-status{top:16px;right:16px;z-index:10;display:flex;align-items:center;gap:8px}
#live-status .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
#live-status .dot.connected{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,0.6);animation:pulse-dot 2s infinite}
#live-status .dot.disconnected{background:#666}
#live-status .player-dots{display:flex;gap:3px;margin-left:6px}
#live-status .player-dot{width:8px;height:8px;border-radius:2px}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.5}}
#zone-name{top:60px;left:50%;transform:translateX(-50%);z-index:10;font-size:16px;font-weight:300;letter-spacing:2px;text-transform:uppercase;opacity:0;transition:opacity 0.8s}
#zone-name.visible{opacity:1}
#controls-hint{bottom:16px;right:16px;z-index:10;font-size:11px;opacity:0.5}
#controls-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;opacity:0;pointer-events:none;transition:opacity 0.3s;min-width:320px}
#controls-overlay.visible{opacity:1}
#controls-overlay table{width:100%;border-collapse:collapse}
#controls-overlay td{padding:4px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
#controls-overlay td:first-child{color:#8fa;text-align:right;white-space:nowrap}
#trace-modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:25;opacity:0;pointer-events:none;transition:opacity 0.2s}
#trace-modal.visible{opacity:1;pointer-events:auto}
#trace-modal input{background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#d4d0c8;font-family:'IBM Plex Mono',monospace;font-size:14px;padding:10px 16px;width:280px;outline:none}
#trace-modal input:focus{border-color:rgba(255,255,255,0.4)}
#scoreboard{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;opacity:0;pointer-events:none;transition:opacity 0.3s;min-width:300px}
#scoreboard.visible{opacity:1}
#scoreboard table{width:100%;border-collapse:collapse}
#scoreboard th{text-align:left;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.15);color:#8fa;font-weight:400}
#scoreboard td{padding:4px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
#mobile-joystick{position:absolute;bottom:30px;left:30px;z-index:15;width:120px;height:120px;display:none;pointer-events:auto}
#joystick-base{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15)}
#joystick-thumb{position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px 0 0 -22px;border-radius:50%;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3)}
#mobile-jump{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:15;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.15);display:none;pointer-events:auto;font-size:20px;line-height:56px;text-align:center;color:rgba(255,255,255,0.4)}
@media(hover:none)and(pointer:coarse){
  #mobile-joystick,#mobile-jump{display:block}
  #controls-hint{display:none}
}
</style>
</head>

<div id="gem-counter" class="hud-panel"><span id="gem-text"></span><div class="gem-slots" id="gem-slots"></div></div>

<div id="mobile-joystick"><div id="joystick-base"><div id="joystick-thumb"></div></div></div>
<div id="mobile-jump">&uarr;</div>

<script type="module">
import * as THREE from 'three';

// ─── CONFIG ───
const CFG = {
  ws: 'wss://park.jaschablume.nl',
  sendInterval: 100,
  sendThreshold: 0.05,
  player: { speed: 0.065, friction: 0.82, gravity: 0.018, jumpVel: 0.28, glideVel: -0.04 },
  cam: { defaultDist: 14, minDist: 6, maxDist: 22, smoothing: 0.09, autoResetDelay: 2000, autoResetLerp: 0.02 },
  maxTraces: 30,
  gemCount: 12,
  npcCount: 8,
  worldSize: 50,
};

// ─── ADJECTIVE-NOUN NAME GENERATOR ───
const ADJ = ['swift','bright','gentle','wild','calm','bold','keen','warm','cool','soft','pale','dark','deep','light','rare','true','pure','wise','fair','free'];
const NOUN = ['crane','finch','wren','heron','swift','lark','dove','owl','jay','robin','hawk','rook','thrush','plover','tern','egret','ibis','merlin','kite','osprey'];
function generateName(){
  return ADJ[Math.floor(Math.random()*ADJ.length)]+'-'+NOUN[Math.floor(Math.random()*NOUN.length)];
}
let playerName = localStorage.getItem('vp2_name');
if(!playerName){playerName=generateName();localStorage.setItem('vp2_name',playerName)}

// ─── STATE ───
const keys = {};
const remotePlayers = new Map();
const traces = [];
const gems = [];
let localId = null, localColor = '#88aacc';
let wsConnected = false, ws = null;
let lastSendTime = 0, lastSentPos = {x:999,z:999,rotY:999};
let audioStarted = false, audioCtx = null;
let showHelp = false, showScoreboard = false, showTrace = false;
let zoneTimer = 0, currentZone = '';
let rHoldStart = 0;
let gemsCollected = JSON.parse(localStorage.getItem('vp2_gems')||'[]');

// Pre-allocated vectors for hot path
const _moveDir = new THREE.Vector3();
const _camTarget = new THREE.Vector3();
const _camPos = new THREE.Vector3();
const _tmpV3 = new THREE.Vector3();
const _tmpMatrix = new THREE.Matrix4();
const _tmpQuat = new THREE.Quaternion();
const _tmpEuler = new THREE.Euler();

// ─── RENDERER ───
const renderer = new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);

// ─── SCENE ───
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a1628,0.018);

// ─── CAMERA ───
const camera = new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.5,200);
const cam = {
  theta: Math.PI, phi: 0.35, dist: CFG.cam.defaultDist,
  smoothPos: new THREE.Vector3(0,2,0),
  autoReset: false, lastInput: 0, isDragging: false
};

// ─── PLAYER ───
const player = {
  mesh: null, pos: new THREE.Vector3(0,5,0), vel: new THREE.Vector3(),
  facingAngle: 0, onGround: false, wingPhase: 0, headBob: 0, breathPhase: 0,
  isMoving: false, wasAirborne: false, landSquash: 0
};

// ─── TIME OF DAY ───
let gameTime = 0; // 0-1 full day cycle, 0.25=dawn, 0.5=noon, 0.75=dusk, 0=midnight
const DAY_SPEED = 0.00003; // full cycle in ~33000 frames (~9 min)

function getTimeOfDay(t){
  // Returns interpolated sky color, sun color, sun intensity, ambient intensity
  const phases = [
    {t:0,    sky:0x050510,sun:0x334466,sunI:0.15,ambI:0.15},  // midnight
    {t:0.2,  sky:0x0a0a20,sun:0x445566,sunI:0.2,ambI:0.2},   // pre-dawn
    {t:0.28, sky:0x331825,sun:0xff8844,sunI:0.8,ambI:0.35},   // dawn
    {t:0.35, sky:0x4488cc,sun:0xffeedd,sunI:1.4,ambI:0.45},   // morning
    {t:0.5,  sky:0x2266aa,sun:0xffffee,sunI:1.8,ambI:0.5},    // noon
    {t:0.65, sky:0x4488cc,sun:0xffeedd,sunI:1.4,ambI:0.45},   // afternoon
    {t:0.72, sky:0x553322,sun:0xff7733,sunI:0.9,ambI:0.35},   // dusk
    {t:0.8,  sky:0x151030,sun:0x445566,sunI:0.2,ambI:0.2},    // twilight
    {t:1.0,  sky:0x050510,sun:0x334466,sunI:0.15,ambI:0.15},  // midnight again
  ];
  let a=phases[0],b=phases[1];
  for(let i=0;i<phases.length-1;i++){
    if(t>=phases[i].t&&t<=phases[i+1].t){a=phases[i];b=phases[i+1];break}
  }
  const f=(t-a.t)/(b.t-a.t);
  const lc=(c1,c2,f)=>{
    const r1=(c1>>16)&0xff,g1=(c1>>8)&0xff,b1=c1&0xff;
    const r2=(c2>>16)&0xff,g2=(c2>>8)&0xff,b2=c2&0xff;
    return((r1+(r2-r1)*f)<<16)|((g1+(g2-g1)*f)<<8)|(b1+(b2-b1)*f);
  };
  return {
    skyColor: lc(a.sky,b.sky,f),
    sunColor: lc(a.sun,b.sun,f),
    sunIntensity: a.sunI+(b.sunI-a.sunI)*f,
    ambIntensity: a.ambI+(b.ambI-a.ambI)*f,
    isNight: t<0.22||t>0.78,
    isDusk: t>0.68&&t<0.78,
    isDawn: t>0.22&&t<0.32
  };
}

// ─── LIGHTING ───
const ambientLight = new THREE.AmbientLight(0x8899bb,0.4);
scene.add(ambientLight);
const sunLight = new THREE.DirectionalLight(0xffffee,1.5);
sunLight.position.set(30,50,20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(1024,1024);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 120;
sunLight.shadow.camera.left = -60;
sunLight.shadow.camera.right = 60;
sunLight.shadow.camera.top = 60;
sunLight.shadow.camera.bottom = -60;
sunLight.shadow.bias = -0.002;
scene.add(sunLight);

// ─── WORLD BUILDER ───
const colliders = []; // {x,z,r} for simple circle colliders

function buildWorld(){
  // Main platform - tiered
  const platformMat = new THREE.MeshStandardMaterial({color:0x8a8070,roughness:0.85,metalness:0.05});
  const tierHeights = [0, 0.3, 0.6];
  const tierSizes = [100, 85, 70];
  for(let i=0;i<3;i++){
    const g = new THREE.BoxGeometry(tierSizes[i],1.5-i*0.3,tierSizes[i]);
    // Vertex color variation
    const colors = new Float32Array(g.attributes.position.count*3);
    for(let j=0;j<colors.length;j+=3){
      const v = 0.85+Math.random()*0.15;
      colors[j]=v*0.54;colors[j+1]=v*0.50;colors[j+2]=v*0.44;
    }
    g.setAttribute('color',new THREE.BufferAttribute(colors,3));
    const mat = platformMat.clone();
    mat.vertexColors = true;
    const m = new THREE.Mesh(g,mat);
    m.position.set(0,tierHeights[i]-0.75+i*0.15,0);
    m.receiveShadow = true;
    scene.add(m);
  }

  // Mossy crack lines on platform
  const crackMat = new THREE.MeshStandardMaterial({color:0x3a5a3a,roughness:0.95});
  for(let i=0;i<30;i++){
    const len = 3+Math.random()*12;
    const g = new THREE.BoxGeometry(0.15,0.05,len);
    const m = new THREE.Mesh(g,crackMat);
    m.position.set((Math.random()-0.5)*70,0.38,(Math.random()-0.5)*70);
    m.rotation.y = Math.random()*Math.PI;
    scene.add(m);
  }

  // ─── SACRED POOL (center) ───
  const poolEdgeMat = new THREE.MeshStandardMaterial({color:0x706860,roughness:0.8});
  // Stone edge ring
  for(let a=0;a<24;a++){
    const angle = (a/24)*Math.PI*2;
    const g = new THREE.BoxGeometry(2.2,0.8,1.2);
    const m = new THREE.Mesh(g,poolEdgeMat);
    m.position.set(Math.cos(angle)*11,0.2,Math.sin(angle)*11);
    m.rotation.y = angle;
    m.receiveShadow = true;
    scene.add(m);
  }
  // Water plane with animated vertices
  const waterGeo = new THREE.PlaneGeometry(20,20,32,32);
  const waterMat = new THREE.MeshStandardMaterial({
    color:0x1155aa,metalness:0.9,roughness:0.1,transparent:true,opacity:0.85
  });
  const waterMesh = new THREE.Mesh(waterGeo,waterMat);
  waterMesh.rotation.x = -Math.PI/2;
  waterMesh.position.y = -0.1;
  waterMesh.receiveShadow = true;
  scene.add(waterMesh);
  // Glow under pool
  const poolLight = new THREE.PointLight(0x2266ff,4,18);
  poolLight.position.set(0,-1.5,0);
  scene.add(poolLight);

  // ─── CRYSTAL GROVE (NW) ───
  const crystalMat = new THREE.MeshStandardMaterial({color:0x00ddbb,emissive:0x00ffcc,emissiveIntensity:1.2,metalness:0.6,roughness:0.2});
  for(let i=0;i<25;i++){
    const x = -35+Math.random()*20;
    const z = -35+Math.random()*20;
    const h = 3+Math.random()*8;
    const g = new THREE.BoxGeometry(0.6+Math.random()*0.6,h,0.6+Math.random()*0.6);
    const m = new THREE.Mesh(g,crystalMat.clone());
    m.position.set(x,h/2,z);
    m.rotation.y = Math.random()*0.5;
    m.rotation.z = (Math.random()-0.5)*0.15;
    m.castShadow = true;
    scene.add(m);
    colliders.push({x,z,r:1.2});
    // Light per crystal
    const cl = new THREE.PointLight(0x00ffcc,3,8);
    cl.position.set(x,h*0.7,z);
    scene.add(cl);
  }

  // ─── ANCIENT FOREST (NE) ───
  const trunkMat = new THREE.MeshStandardMaterial({color:0x4a3520,roughness:0.9});
  const leafColors = [0x1a5a2a,0x2a6a3a,0x1a4a20,0x286830];
  for(let i=0;i<40;i++){
    const x = 15+Math.random()*25;
    const z = -40+Math.random()*25;
    const treeH = 4+Math.random()*3;
    // Trunk
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.5,treeH,6),trunkMat);
    trunk.position.set(x,treeH/2,z);
    trunk.castShadow = true;
    scene.add(trunk);
    colliders.push({x,z,r:1.0});
    // 3 canopy layers
    for(let j=0;j<3;j++){
      const r = 2.5-j*0.6;
      const h = 2.2-j*0.4;
      const leafMat = new THREE.MeshStandardMaterial({color:leafColors[j%leafColors.length],roughness:0.85});
      // Vertex color variation
      const cg = new THREE.ConeGeometry(r,h,7);
      const cols = new Float32Array(cg.attributes.position.count*3);
      for(let k=0;k<cols.length;k+=3){
        const v=0.8+Math.random()*0.2;
        cols[k]=v*0.15;cols[k+1]=v*0.4;cols[k+2]=v*0.15;
      }
      cg.setAttribute('color',new THREE.BufferAttribute(cols,3));
      const lmat = leafMat.clone();lmat.vertexColors=true;
      const leaf = new THREE.Mesh(cg,lmat);
      leaf.position.set(x,treeH+j*1.2+0.5,z);
      leaf.castShadow = true;
      scene.add(leaf);
    }
  }

  // ─── RUINS (SW) ───
  const ruinMat = new THREE.MeshStandardMaterial({color:0x706050,roughness:0.9,metalness:0.05});
  // Columns
  for(let i=0;i<12;i++){
    const x = -40+Math.random()*25;
    const z = 15+Math.random()*25;
    const h = 4+Math.random()*6;
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.6,h,8),ruinMat);
    col.position.set(x,h/2,z);
    col.castShadow = true;
    scene.add(col);
    colliders.push({x,z,r:1.2});
  }
  // Arches (3 boxes each)
  for(let i=0;i<4;i++){
    const cx = -35+i*7;
    const cz = 25+Math.random()*10;
    // Two pillars
    for(let s=-1;s<=1;s+=2){
      const p = new THREE.Mesh(new THREE.BoxGeometry(1,6,1),ruinMat);
      p.position.set(cx+s*2.5,3,cz);
      p.castShadow=true;
      scene.add(p);
    }
    // Lintel
    const l = new THREE.Mesh(new THREE.BoxGeometry(6.5,0.8,1.2),ruinMat);
    l.position.set(cx,6.2,cz);
    l.castShadow=true;
    scene.add(l);
  }
  // Fallen blocks
  for(let i=0;i<8;i++){
    const g = new THREE.BoxGeometry(1+Math.random()*2,0.8+Math.random()*1.5,1+Math.random()*2);
    const m = new THREE.Mesh(g,ruinMat);
    m.position.set(-35+Math.random()*20,0.5,18+Math.random()*20);
    m.rotation.set((Math.random()-0.5)*0.4,Math.random()*Math.PI,(Math.random()-0.5)*0.3);
    m.castShadow=true;
    scene.add(m);
  }

  // ─── MARKET QUAD (SE) ───
  const stallMat = new THREE.MeshStandardMaterial({color:0x8a6840,roughness:0.85});
  const lanternColors = [0xffaa44,0xff8833,0xffcc55,0xff9944,0xffbb44,0xffaa33];
  for(let i=0;i<6;i++){
    const sx = 18+Math.floor(i/2)*10;
    const sz = 18+(i%2)*12;
    // Roof
    const roof = new THREE.Mesh(new THREE.BoxGeometry(5,0.3,4),stallMat);
    roof.position.set(sx,3.5,sz);
    roof.castShadow=true;
    scene.add(roof);
    // 4 posts
    for(let px=-1;px<=1;px+=2)for(let pz=-1;pz<=1;pz+=2){
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.25,3.5,0.25),stallMat);
      post.position.set(sx+px*2.2,1.75,sz+pz*1.7);
      post.castShadow=true;
      scene.add(post);
    }
    // Lantern
    const lanternColor = lanternColors[i%lanternColors.length];
    const lantern = new THREE.Mesh(
      new THREE.SphereGeometry(0.3,8,8),
      new THREE.MeshStandardMaterial({color:lanternColor,emissive:lanternColor,emissiveIntensity:1.5})
    );
    lantern.position.set(sx,3.1,sz);
    scene.add(lantern);
    const ll = new THREE.PointLight(lanternColor,2,10);
    ll.position.set(sx,3,sz);
    scene.add(ll);
  }

  // ─── SKY BRIDGES + OUTER ISLANDS ───
  const bridgeMat = new THREE.MeshStandardMaterial({color:0x7a7060,roughness:0.85});
  const bridgeData = [
    {dx:0,dz:-1,feature:'crystal'},  // North
    {dx:0,dz:1,feature:'tree'},      // South
    {dx:-1,dz:0,feature:'ruin'},     // West
    {dx:1,dz:0,feature:'meditate'},  // East
  ];
  bridgeData.forEach((bd,i)=>{
    // Bridge walkway
    const bLen = 25;
    const bx = bd.dx*(CFG.worldSize+bLen/2);
    const bz = bd.dz*(CFG.worldSize+bLen/2);
    const isHoriz = bd.dx!==0;
    const bridge = new THREE.Mesh(
      new THREE.BoxGeometry(isHoriz?bLen:3,0.8,isHoriz?3:bLen),
      bridgeMat
    );
    bridge.position.set(bx,-0.1,bz);
    bridge.receiveShadow=true;
    scene.add(bridge);

    // Outer island
    const ix = bd.dx*(CFG.worldSize+bLen+12);
    const iz = bd.dz*(CFG.worldSize+bLen+12);
    const island = new THREE.Mesh(new THREE.BoxGeometry(25,2,25),platformMat);
    island.position.set(ix,-0.5,iz);
    island.receiveShadow=true;
    scene.add(island);

    // Island features
    if(bd.feature==='crystal'){
      const cg = new THREE.BoxGeometry(1.5,14,1.5);
      const cm = new THREE.Mesh(cg,crystalMat);
      cm.position.set(ix,7,iz);cm.castShadow=true;
      scene.add(cm);
      const cl=new THREE.PointLight(0x00ffcc,5,15);cl.position.set(ix,10,iz);scene.add(cl);
    }else if(bd.feature==='tree'){
      const t = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.6,8,6),trunkMat);
      t.position.set(ix,4,iz);t.castShadow=true;scene.add(t);
      const lf = new THREE.Mesh(new THREE.ConeGeometry(4,5,7),new THREE.MeshStandardMaterial({color:0x1a5a2a,roughness:0.85}));
      lf.position.set(ix,9,iz);lf.castShadow=true;scene.add(lf);
    }else if(bd.feature==='ruin'){
      for(let s=-1;s<=1;s+=2){
        const p=new THREE.Mesh(new THREE.BoxGeometry(1,7,1),ruinMat);
        p.position.set(ix+s*3,3.5,iz);p.castShadow=true;scene.add(p);
      }
      const lt=new THREE.Mesh(new THREE.BoxGeometry(7.5,0.8,1.2),ruinMat);
      lt.position.set(ix,7.2,iz);lt.castShadow=true;scene.add(lt);
    }else{
      // Meditation platform
      const mp=new THREE.Mesh(new THREE.CylinderGeometry(4,4.5,0.5,12),new THREE.MeshStandardMaterial({color:0x9a9080,roughness:0.7}));
      mp.position.set(ix,0.5,iz);mp.receiveShadow=true;scene.add(mp);
    }
  });

  // ─── WATERFALLS (4 edges) ───
  // Using Points for each waterfall
  const waterfallPositions = [
    {x:0,z:-50,spread:'x'},{x:0,z:50,spread:'x'},
    {x:-50,z:0,spread:'z'},{x:50,z:0,spread:'z'}
  ];
  window._waterfalls = [];
  waterfallPositions.forEach(wf=>{
    const count = 300;
    const positions = new Float32Array(count*3);
    for(let i=0;i<count;i++){
      const off = (Math.random()-0.5)*20;
      positions[i*3]   = wf.x + (wf.spread==='x'?off:0);
      positions[i*3+1] = -Math.random()*15;
      positions[i*3+2] = wf.z + (wf.spread==='z'?off:0);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
    const mat = new THREE.PointsMaterial({color:0xaaccff,size:0.4,transparent:true,opacity:0.6});
    const pts = new THREE.Points(geo,mat);
    scene.add(pts);
    window._waterfalls.push({pts,baseX:wf.x,baseZ:wf.z,spread:wf.spread});
  });

  // ─── CLOUD LAYER ───
  const cloudCount = 2000;
  const cloudPositions = new Float32Array(cloudCount*3);
  for(let i=0;i<cloudCount;i++){
    cloudPositions[i*3]   = (Math.random()-0.5)*200;
    cloudPositions[i*3+1] = -10-Math.random()*20;
    cloudPositions[i*3+2] = (Math.random()-0.5)*200;
  }
  const cloudGeo = new THREE.BufferGeometry();
  cloudGeo.setAttribute('position',new THREE.BufferAttribute(cloudPositions,3));
  const cloudMat = new THREE.PointsMaterial({color:0xffffff,size:2.5,transparent:true,opacity:0.4});
  scene.add(new THREE.Points(cloudGeo,cloudMat));
  // Cloud floor plane
  const cloudPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(250,250),
    new THREE.MeshStandardMaterial({color:0xddeeff,transparent:true,opacity:0.7,side:THREE.DoubleSide})
  );
  cloudPlane.rotation.x = -Math.PI/2;
  cloudPlane.position.y = -8;
  scene.add(cloudPlane);

  // ─── FIREFLIES ───
  const ffCount = 60;
  const ffPositions = new Float32Array(ffCount*3);
  const ffPhases = new Float32Array(ffCount);
  for(let i=0;i<ffCount;i++){
    ffPositions[i*3]   = (Math.random()-0.5)*90;
    ffPositions[i*3+1] = 1+Math.random()*5;
    ffPositions[i*3+2] = (Math.random()-0.5)*90;
    ffPhases[i] = Math.random()*Math.PI*2;
  }
  const ffGeo = new THREE.BufferGeometry();
  ffGeo.setAttribute('position',new THREE.BufferAttribute(ffPositions,3));
  const ffMat = new THREE.PointsMaterial({color:0xccff66,size:0.5,transparent:true,opacity:0.0});
  const fireflies = new THREE.Points(ffGeo,ffMat);
  scene.add(fireflies);
  window._fireflies = {mesh:fireflies,phases:ffPhases};

  // ─── STARS ───
  const starCount = 2000;
  const starPositions = new Float32Array(starCount*3);
  for(let i=0;i<starCount;i++){
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI*0.45;
    const r = 90;
    starPositions[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    starPositions[i*3+1] = r*Math.cos(phi)+10;
    starPositions[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position',new THREE.BufferAttribute(starPositions,3));
  const starMat = new THREE.PointsMaterial({color:0xffffff,size:0.4,transparent:true,opacity:0.0});
  const stars = new THREE.Points(starGeo,starMat);
  scene.add(stars);
  window._stars = stars;

  // Store water mesh for animation
  window._waterMesh = waterMesh;
}

// ─── TERRAIN HEIGHT ───
function getTerrainY(x,z){
  // Main platform
  const hw = CFG.worldSize;
  if(Math.abs(x)<=hw&&Math.abs(z)<=hw) return 0.38;
  // Bridges
  const bw = 1.5; // half-width
  const bridgeStart = hw;
  const bridgeEnd = hw+25;
  // North bridge
  if(Math.abs(x)<=bw&&z>=-bridgeEnd&&z<=-bridgeStart) return 0.0;
  // South bridge
  if(Math.abs(x)<=bw&&z>=bridgeStart&&z<=bridgeEnd) return 0.0;
  // West bridge
  if(Math.abs(z)<=bw&&x>=-bridgeEnd&&x<=-bridgeStart) return 0.0;
  // East bridge
  if(Math.abs(z)<=bw&&x>=bridgeStart&&x<=bridgeEnd) return 0.0;
  // Outer islands
  const islandDist = hw+25+12;
  const islandHalf = 12.5;
  const islands = [
    {x:0,z:-islandDist},{x:0,z:islandDist},
    {x:-islandDist,z:0},{x:islandDist,z:0}
  ];
  for(const isl of islands){
    if(Math.abs(x-isl.x)<=islandHalf&&Math.abs(z-isl.z)<=islandHalf) return 0.0;
  }
  return -100; // void
}

// ─── ZONE DETECTION ───
function detectZone(x,z){
  if(x>=-10&&x<=10&&z>=-10&&z<=10) return 'Sacred Pool';
  if(x>=-38&&x<=-12&&z>=-38&&z<=-12) return 'Crystal Grove';
  if(x>=12&&x<=43&&z>=-43&&z<=-12) return 'Ancient Forest';
  if(x>=-43&&x<=-12&&z>=12&&z<=43) return 'The Ruins';
  if(x>=12&&x<=43&&z>=12&&z<=43) return 'Market Quarter';
  const hw = CFG.worldSize;
  if(Math.abs(x)>hw||Math.abs(z)>hw) return 'Sky Bridge';
  return '';
}

// ─── BUILD BIRD ───
function createBird(color,isLocal=false){
  const group = new THREE.Group();
  const bodyColor = new THREE.Color(color);
  const headColor = bodyColor.clone().lerp(new THREE.Color(0xffffff),0.2);
  const bodyMat = new THREE.MeshStandardMaterial({color:bodyColor,roughness:0.65,metalness:0.1});
  const headMat = new THREE.MeshStandardMaterial({color:headColor,roughness:0.65,metalness:0.1});
  const beakMat = new THREE.MeshStandardMaterial({color:0xddaa44,roughness:0.5});
  const eyeMat = new THREE.MeshStandardMaterial({color:0x111111});
  const eyeHighMat = new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.3});

  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.2,0.7,1.8),bodyMat);
  body.castShadow = true;
  group.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.75,0.65,0.7),headMat);
  head.position.set(0,0.55,0.65);
  head.castShadow = true;
  group.add(head);

  // Beak
  const beak = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.2,0.45),beakMat);
  beak.position.set(0,0.48,1.18);
  group.add(beak);

  // Eyes
  for(let s=-1;s<=1;s+=2){
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),eyeMat);
    eye.position.set(s*0.28,0.65,0.85);
    group.add(eye);
    const highlight = new THREE.Mesh(new THREE.SphereGeometry(0.04,6,6),eyeHighMat);
    highlight.position.set(s*0.28+s*0.04,0.7,0.9);
    group.add(highlight);
  }

  // Wings
  const wingMat = bodyMat.clone();
  const createWing = (side)=>{
    const wingGroup = new THREE.Group();
    // Upper segment
    const upper = new THREE.Mesh(new THREE.BoxGeometry(1.4,0.12,0.7),wingMat);
    upper.position.set(side*0.7,0,0);
    wingGroup.add(upper);
    // Lower/tip
    const lower = new THREE.Mesh(new THREE.BoxGeometry(1.1,0.1,0.55),wingMat);
    lower.position.set(side*1.3,-0.05,0);
    wingGroup.add(lower);
    wingGroup.position.set(side*0.6,0.15,0);
    return wingGroup;
  };
  const leftWing = createWing(-1);
  const rightWing = createWing(1);
  group.add(leftWing);
  group.add(rightWing);

  // Tail
  for(let i=-1;i<=1;i++){
    const tail = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.08,0.6),bodyMat);
    tail.position.set(i*0.2,0.1,-0.95);
    tail.rotation.y = i*0.15;
    tail.rotation.x = 0.2;
    group.add(tail);
  }

  group.userData = {leftWing,rightWing,body,head};
  if(isLocal){
    group.traverse(c=>{if(c.isMesh)c.castShadow=true});
  }
  return group;
}

// ─── ANIMATE BIRD ───
function animateBird(group,time,isMoving,isAirborne,wingPhase,headBob,breathPhase,landSquash){
  const {leftWing,rightWing,body,head} = group.userData;
  if(!leftWing) return;

  let wingFreq, wingAmp;
  if(isAirborne){
    // Gliding: spread wings, slow undulation
    wingFreq = 1; wingAmp = 0.15;
    const base = 0.5;
    leftWing.rotation.z = -(base + Math.sin(time*wingFreq+wingPhase)*wingAmp);
    rightWing.rotation.z = (base + Math.sin(time*wingFreq+wingPhase)*wingAmp);
  }else if(isMoving){
    wingFreq = 3; wingAmp = 0.4;
    leftWing.rotation.z = -Math.sin(time*wingFreq+wingPhase)*wingAmp;
    rightWing.rotation.z = Math.sin(time*wingFreq+wingPhase)*wingAmp;
  }else{
    // Idle fold
    wingFreq = 0.3; wingAmp = 0.08;
    leftWing.rotation.z = -0.15 - Math.sin(time*wingFreq+wingPhase)*wingAmp;
    rightWing.rotation.z = 0.15 + Math.sin(time*wingFreq+wingPhase)*wingAmp;
  }

  // Head bob
  if(isMoving){
    head.position.y = 0.55 + Math.sin(time*2+headBob)*0.06;
  }else{
    head.position.y = 0.55;
  }

  // Breathing
  const breathScale = 1 + Math.sin(time*0.5+breathPhase)*0.03;
  body.scale.y = breathScale * (landSquash>0 ? 0.7+(1-0.7)*(1-landSquash) : 1);
}

function createGemBurst(pos){
  const particles = [];

    const geo = new THREE.SphereGeometry(0.12,6,6);

// ─── NPC BIRDS ───
const npcPalette = [0xc47a5a,0x8a9a6a,0x6a8aaa,0xaa8a4a,0x9a5a4a,0x5a7a5a,0x7a7a8a,0xd4c8a0];
const npcs = [];
const npcGroups = [];

function initNPCs(){
  for(let i=0;i<CFG.npcCount;i++){
    const color = npcPalette[i%npcPalette.length];
    const group = createBird('#'+color.toString(16).padStart(6,'0'));
    const angle = (i/CFG.npcCount)*Math.PI*2;
    const r = 15+Math.random()*20;
    group.position.set(Math.cos(angle)*r,0.38,Math.sin(angle)*r);
    group.scale.set(0.8,0.8,0.8);
    scene.add(group);
    npcGroups.push(group);
    npcs.push({
      pos: new THREE.Vector3(Math.cos(angle)*r,0.38,Math.sin(angle)*r),
      vel: new THREE.Vector3(),
      facingAngle: Math.random()*Math.PI*2,
      wingPhase: Math.random()*Math.PI*2,
      wanderAngle: Math.random()*Math.PI*2,
      wanderTimer: 0
    });
  }
}

function updateNPCs(time){
  npcs.forEach((npc,i)=>{
    // Wander
    npc.wanderTimer -= 1;
    if(npc.wanderTimer<=0){
      npc.wanderAngle += (Math.random()-0.5)*1.5;
      npc.wanderTimer = 60+Math.random()*120;
    }
    let fx = Math.sin(npc.wanderAngle)*0.012;
    let fz = Math.cos(npc.wanderAngle)*0.012;

    // Separation from other NPCs
    npcs.forEach((other,j)=>{
      if(i===j) return;
      const dx = npc.pos.x-other.pos.x, dz = npc.pos.z-other.pos.z;
      const d = Math.sqrt(dx*dx+dz*dz);
      if(d<4&&d>0.01){const s=0.005/d;fx+=dx*s;fz+=dz*s}
    });

    // Avoid player
    const pdx = npc.pos.x-player.pos.x, pdz = npc.pos.z-player.pos.z;
    const pd = Math.sqrt(pdx*pdx+pdz*pdz);
    if(pd<6&&pd>0.01){const s=0.02/pd;fx+=pdx*s;fz+=pdz*s}

    // Stay on island
    if(Math.abs(npc.pos.x)>42){fx+=-Math.sign(npc.pos.x)*0.03}
    if(Math.abs(npc.pos.z)>42){fz+=-Math.sign(npc.pos.z)*0.03}

    npc.vel.x += fx; npc.vel.z += fz;
    npc.vel.x *= 0.88; npc.vel.z *= 0.88;
    npc.pos.x += npc.vel.x; npc.pos.z += npc.vel.z;
    npc.pos.y = getTerrainY(npc.pos.x,npc.pos.z);

    // Facing
    if(Math.abs(npc.vel.x)>0.002||Math.abs(npc.vel.z)>0.002){
      const target = Math.atan2(npc.vel.x,npc.vel.z);
      npc.facingAngle = lerpAngle(npc.facingAngle,target,0.08);
    }

    const group = npcGroups[i];
    group.position.copy(npc.pos);
    group.rotation.y = npc.facingAngle;
    const isMoving = Math.abs(npc.vel.x)>0.005||Math.abs(npc.vel.z)>0.005;
    animateBird(group,time,isMoving,false,npc.wingPhase,0,i*1.3,0);
  });
}

  remotePlayers.forEach((rp)=>{

// ─── AUDIO ───
function initAudio(){
  if(audioStarted) return;
  audioStarted = true;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const master = audioCtx.createGain();
    master.gain.value = 0.12;
    master.connect(audioCtx.destination);

    // Reverb via convolution
    const reverbLen = audioCtx.sampleRate*2;
    const reverbBuf = audioCtx.createBuffer(2,reverbLen,audioCtx.sampleRate);
    for(let ch=0;ch<2;ch++){
      const data = reverbBuf.getChannelData(ch);
      for(let i=0;i<reverbLen;i++){
        data[i] = (Math.random()*2-1)*Math.pow(1-i/reverbLen,2.5);
      }
    }
    const convolver = audioCtx.createConvolver();
    convolver.buffer = reverbBuf;

    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.4;
    convolver.connect(reverbGain);
    reverbGain.connect(master);

    const dryGain = audioCtx.createGain();
    dryGain.gain.value = 0.6;
    dryGain.connect(master);

    // Biquad filter with LFO
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1200;
    filter.Q.value = 2;
    filter.connect(convolver);
    filter.connect(dryGain);

    // LFO on filter
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.05;
    lfoGain.gain.value = 800;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);
    lfo.start();

    // 4 detuned oscillators (D3 chord)
    const freqs = [146,220,293,440];
    freqs.forEach((f,i)=>{
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;
      osc.detune.value = (Math.random()-0.5)*8;
      const g = audioCtx.createGain();
      g.gain.value = 0.06;
      osc.connect(g);
      g.connect(filter);
      osc.start();
    });

    // Sub bass
    const sub = audioCtx.createOscillator();
    sub.type = 'sine';
    sub.frequency.value = 73;
    const subGain = audioCtx.createGain();
    subGain.gain.value = 0.04;
    sub.connect(subGain);
    subGain.connect(filter);
    sub.start();

    window._audioFilter = filter;
    window._audioMaster = master;
  }catch(e){/* audio not supported */}
}

function updateAudioZone(zone){
  if(!window._audioFilter) return;
  const f = window._audioFilter;
  if(zone==='Crystal Grove') f.frequency.linearRampToValueAtTime(2400,audioCtx.currentTime+1);
  else if(zone==='Ancient Forest') f.frequency.linearRampToValueAtTime(1800,audioCtx.currentTime+1);
  else if(zone==='The Ruins') f.frequency.linearRampToValueAtTime(600,audioCtx.currentTime+1);
  else f.frequency.linearRampToValueAtTime(1200,audioCtx.currentTime+1);
}

// ─── WEBSOCKET ───
function connectWS(){
  try{
    ws = new WebSocket(CFG.ws);
  }catch(e){
    setTimeout(connectWS,5000);
    return;
  }

  ws.onopen = ()=>{
    wsConnected = true;
    updateStatusHUD();
  };

  ws.onclose = ()=>{
    wsConnected = false;
    ws = null;
    updateStatusHUD();
    setTimeout(connectWS,5000);
  };

  ws.onerror = ()=>{
    wsConnected = false;
  };

  ws.onmessage = (e)=>{
    let msg;
    try{msg=JSON.parse(e.data)}catch{return}

    if(msg.type==='welcome'){
      localId = msg.id;
      localColor = msg.color||localColor;
      // Rebuild player bird with server color
      if(player.mesh){scene.remove(player.mesh)}
      initPlayer();
      // Add existing players
      if(msg.players){
        msg.players.forEach(p=>{if(p.id!==localId)addRemotePlayer(p.id,p)});
      }
      updatePlayerHUD();
      updateStatusHUD();
    }
    else if(msg.type==='join'){
      addRemotePlayer(msg.id,msg);
      updateStatusHUD();
    }
    else if(msg.type==='update'){
      if(msg.id===localId) return;
      const rp = remotePlayers.get(msg.id);
      if(rp){
        rp.targetX = msg.x; rp.targetZ = msg.z; rp.targetRotY = msg.rotY;
        if(msg.name) rp.name = msg.name;
        if(msg.color) rp.color = msg.color;
      }else{
        addRemotePlayer(msg.id,msg);
      }
      updateStatusHUD();
    }
    else if(msg.type==='leave'){
      removeRemotePlayer(msg.id);
      updateStatusHUD();
    }
    else if(msg.type==='trace'){
      createTraceMarker(msg.x,msg.z,msg.text,msg.color);
    }
  };
}

function sendMove(){
  if(!ws||ws.readyState!==1) return;
  const now = performance.now();
  if(now-lastSendTime<CFG.sendInterval) return;
  const dx = Math.abs(player.pos.x-lastSentPos.x);
  const dz = Math.abs(player.pos.z-lastSentPos.z);
  const dr = Math.abs(player.facingAngle-lastSentPos.rotY);
  if(dx<CFG.sendThreshold&&dz<CFG.sendThreshold&&dr<0.05) return;
  lastSendTime = now;
  lastSentPos.x = player.pos.x;
  lastSentPos.z = player.pos.z;
  lastSentPos.rotY = player.facingAngle;
  ws.send(JSON.stringify({type:'move',x:player.pos.x,z:player.pos.z,rotY:player.facingAngle,name:playerName}));
}

function sendTrace(text){
  if(!ws||ws.readyState!==1) return;
  ws.send(JSON.stringify({type:'trace',x:player.pos.x,z:player.pos.z,text}));
  createTraceMarker(player.pos.x,player.pos.z,text,localColor);
}

// ─── INPUT ───
document.addEventListener('keydown',(e)=>{
  if(showTrace&&e.key!=='Escape'&&e.key!=='Enter') return;
  const k = e.key.toLowerCase();
  keys[k] = true;
  keys[e.key] = true;

  if(k==='?'||k==='h'){
    showHelp=!showHelp;
    document.getElementById('controls-overlay').classList.toggle('visible',showHelp);
  }
  if(e.key==='Tab'){
    e.preventDefault();
    showScoreboard=!showScoreboard;
    document.getElementById('scoreboard').classList.toggle('visible',showScoreboard);
    if(showScoreboard) updateScoreboardHUD();
  }
  if(k==='e'&&!showTrace){
    showTrace=true;
    document.getElementById('trace-modal').classList.add('visible');
    const inp = document.getElementById('trace-input');
    inp.value='';
    setTimeout(()=>inp.focus(),50);
  }
  if(e.key==='Escape'&&showTrace){
    showTrace=false;
    document.getElementById('trace-modal').classList.remove('visible');
  }
  if(e.key==='Enter'&&showTrace){
    const inp = document.getElementById('trace-input');
    if(inp.value.trim()){
      sendTrace(inp.value.trim());
    }
    showTrace=false;
    document.getElementById('trace-modal').classList.remove('visible');
  }
  if(k==='r') rHoldStart = performance.now();
  if(!audioStarted) initAudio();
});
document.addEventListener('keyup',(e)=>{
  const k = e.key.toLowerCase();
  keys[k] = false;
  keys[e.key] = false;
  if(k==='r'&&rHoldStart>0&&performance.now()-rHoldStart>2000){
    gemsCollected=[];
    localStorage.setItem('vp2_gems','[]');
    gems.forEach(g=>{g.collected=false;g.mesh.visible=true});
    updateGemHUD();
    rHoldStart=0;
  }
});

// Mouse camera control
let mouseBtn = -1;
renderer.domElement.addEventListener('contextmenu',(e)=>e.preventDefault());
renderer.domElement.addEventListener('mousedown',(e)=>{
  mouseBtn = e.button;
  if(e.button===2) cam.isDragging=true;
  if(!audioStarted) initAudio();
});
window.addEventListener('mouseup',()=>{mouseBtn=-1;cam.isDragging=false});
window.addEventListener('mousemove',(e)=>{
  if(cam.isDragging){
    cam.theta -= e.movementX*0.004;
    cam.phi = Math.max(0.1,Math.min(1.1,cam.phi-e.movementY*0.003));
    cam.lastInput = performance.now();
    cam.autoReset = false;
  }
});
renderer.domElement.addEventListener('wheel',(e)=>{
  cam.dist = Math.max(CFG.cam.minDist,Math.min(CFG.cam.maxDist,cam.dist+e.deltaY*0.01));
},{passive:true});

// Touch controls
let touchCamId = null, touchCamStart = null;
const joystickBase = document.getElementById('joystick-base');
const joystickThumb = document.getElementById('joystick-thumb');
let joystickActive = false, joystickId = null, joystickCenter = {x:0,y:0};
let mobileJoystickInput = {x:0,y:0};

if(joystickBase){
  joystickBase.addEventListener('touchstart',(e)=>{
    e.preventDefault();
    if(!audioStarted) initAudio();
    const t = e.changedTouches[0];
    joystickId = t.identifier;
    joystickActive = true;
    const rect = joystickBase.getBoundingClientRect();
    joystickCenter = {x:rect.left+rect.width/2,y:rect.top+rect.height/2};
  },{passive:false});
}

document.getElementById('mobile-jump')?.addEventListener('touchstart',(e)=>{
  e.preventDefault();
  keys[' '] = true;
  if(!audioStarted) initAudio();
},{passive:false});
document.getElementById('mobile-jump')?.addEventListener('touchend',(e)=>{
  e.preventDefault();
  keys[' '] = false;
},{passive:false});

renderer.domElement.addEventListener('touchstart',(e)=>{
  if(!audioStarted) initAudio();
  for(let i=0;i<e.changedTouches.length;i++){
    const t = e.changedTouches[i];
    if(t.clientX>window.innerWidth*0.4){
      touchCamId = t.identifier;
      touchCamStart = {x:t.clientX,y:t.clientY};
    }
  }
},{passive:true});

renderer.domElement.addEventListener('touchmove',(e)=>{
  for(let i=0;i<e.changedTouches.length;i++){
    const t = e.changedTouches[i];
    if(t.identifier===touchCamId&&touchCamStart){
      cam.theta -= (t.clientX-touchCamStart.x)*0.005;
      cam.phi = Math.max(0.1,Math.min(1.1,cam.phi-(t.clientY-touchCamStart.y)*0.004));
      touchCamStart = {x:t.clientX,y:t.clientY};
      cam.lastInput = performance.now();
      cam.autoReset = false;
    }
  }
},{passive:true});

renderer.domElement.addEventListener('touchend',(e)=>{
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===touchCamId){
      touchCamId = null; touchCamStart = null;
    }
  }
},{passive:true});

window.addEventListener('touchmove',(e)=>{
  for(let i=0;i<e.changedTouches.length;i++){
    const t = e.changedTouches[i];
    if(t.identifier===joystickId&&joystickActive){
      const dx = t.clientX-joystickCenter.x;
      const dy = t.clientY-joystickCenter.y;
      const dist = Math.min(Math.sqrt(dx*dx+dy*dy),50);
      const angle = Math.atan2(dy,dx);
      const nx = (dist/50)*Math.cos(angle);
      const ny = (dist/50)*Math.sin(angle);
      mobileJoystickInput = {x:nx,y:ny};
      joystickThumb.style.transform = `translate(${nx*30}px, ${ny*30}px)`;
    }
  }
},{passive:true});

window.addEventListener('touchend',(e)=>{
  for(let i=0;i<e.changedTouches.length;i++){
    if(e.changedTouches[i].identifier===joystickId){
      joystickActive=false;joystickId=null;
      mobileJoystickInput={x:0,y:0};
      joystickThumb.style.transform='';
    }
  }
},{passive:true});

// ─── HUD ───
function updateGemHUD(){
  const el = document.getElementById('gem-text');
  el.textContent = `\u25C8 ${gemsCollected.length} / ${CFG.gemCount}`;
  const slots = document.getElementById('gem-slots');
  slots.innerHTML = '';
  for(let i=0;i<CFG.gemCount;i++){
    const d = document.createElement('div');
    d.className = 'gem-slot'+(gemsCollected.includes(i)?' collected':'');
    slots.appendChild(d);
  }
}

function updatePlayerHUD(){
  document.getElementById('player-swatch').style.background = localColor;
  document.getElementById('player-name-display').textContent = playerName;
}

function updateStatusHUD(){
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const dots = document.getElementById('player-dots');
  if(wsConnected){
    dot.className = 'dot connected';
    const count = remotePlayers.size+1;
    text.textContent = `LIVE  ${count} player${count!==1?'s':''}`;
    dots.innerHTML = '';
    // Local player dot
    const ld = document.createElement('div');
    ld.className='player-dot';ld.style.background=localColor;
    dots.appendChild(ld);
    remotePlayers.forEach(rp=>{
      const rd = document.createElement('div');
      rd.className='player-dot';rd.style.background=rp.color;
      dots.appendChild(rd);
    });
  }else{
    dot.className = 'dot disconnected';
    text.textContent = 'offline';
    dots.innerHTML = '';
  }
}

function updateZoneHUD(zone){
  if(zone===currentZone) return;
  currentZone = zone;
  const el = document.getElementById('zone-name');
  if(zone){
    el.textContent = zone;
    el.classList.add('visible');
    clearTimeout(zoneTimer);
    zoneTimer = setTimeout(()=>el.classList.remove('visible'),3000);
  }else{
    el.classList.remove('visible');
  }
  updateAudioZone(zone);
}

function updateScoreboardHUD(){
  const tbody = document.querySelector('#scoreboard-table tbody');
  tbody.innerHTML = '';
  // Local
  const tr = document.createElement('tr');
  tr.innerHTML = `<td style="color:${localColor}">${playerName}</td><td>${gemsCollected.length}</td>`;
  tbody.appendChild(tr);
  remotePlayers.forEach(rp=>{
    const tr2 = document.createElement('tr');
    tr2.innerHTML = `<td style="color:${rp.color}">${rp.name}</td><td>-</td>`;
    tbody.appendChild(tr2);
  });
}

// ─── HELPERS ───
function lerpAngle(a,b,t){
  let diff = b-a;
  while(diff>Math.PI) diff-=Math.PI*2;
  while(diff<-Math.PI) diff+=Math.PI*2;
  return a+diff*t;
}

// ─── RESIZE ───
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─── MAIN LOOP ───
let lastTime = 0;
let frameCount = 0;

function animate(timestamp){
  requestAnimationFrame(animate);
  let dt = (timestamp-lastTime)/1000;
  if(dt>0.05) dt = 0.05; // cap
  lastTime = timestamp;
  frameCount++;
  const time = timestamp*0.001;

  // Time of day
  gameTime = (gameTime + DAY_SPEED)%1.0;
  const tod = getTimeOfDay(gameTime);

  // Update sky/lighting
  scene.fog.color.setHex(tod.skyColor);
  scene.background = scene.fog.color;
  sunLight.color.setHex(tod.sunColor);
  sunLight.intensity = tod.sunIntensity;
  ambientLight.intensity = tod.ambIntensity;

  // Sun position
  const sunAngle = gameTime*Math.PI*2 - Math.PI/2;
  sunLight.position.set(Math.cos(sunAngle)*40, Math.sin(sunAngle)*50+10, 20);

  // Stars
  if(window._stars) window._stars.material.opacity = tod.isNight?0.8:(tod.isDusk||tod.isDawn?0.3:0);

  // Fireflies (dusk + night)
  if(window._fireflies){
    const ff = window._fireflies;
    const ffOpacity = tod.isNight?0.7:(tod.isDusk?0.4:0);
    ff.mesh.material.opacity = ffOpacity;
    if(ffOpacity>0){
      const pos = ff.mesh.geometry.attributes.position;
      for(let i=0;i<pos.count;i++){
        pos.setY(i, pos.getY(i)+Math.sin(time*0.5+ff.phases[i])*0.003);
        pos.setX(i, pos.getX(i)+Math.sin(time*0.3+ff.phases[i]*2)*0.002);
      }
      pos.needsUpdate = true;
    }
  }

  // Water animation
  if(window._waterMesh){
    const pos = window._waterMesh.geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
      const x = pos.getX(i);
      const z = pos.getY(i); // note: plane is rotated, so Y in geometry = Z visually
      pos.setZ(i, Math.sin(x*0.5+time*1.5)*0.15+Math.sin(z*0.7+time*1.2)*0.1);
    }
    pos.needsUpdate = true;
  }

  // Waterfalls
  if(window._waterfalls){
    window._waterfalls.forEach(wf=>{
      const pos = wf.pts.geometry.attributes.position;
      for(let i=0;i<pos.count;i++){
        let y = pos.getY(i)-0.15;
        if(y<-15) y=0;
        pos.setY(i,y);
      }
      pos.needsUpdate = true;
    });
  }

  // ─── PLAYER INPUT ───
  if(!showTrace){
    _moveDir.set(0,0,0);

    // Keyboard
    if(keys['w']||keys['arrowup'])    {_moveDir.x-=Math.sin(cam.theta);_moveDir.z-=Math.cos(cam.theta)}
    if(keys['s']||keys['arrowdown'])  {_moveDir.x+=Math.sin(cam.theta);_moveDir.z+=Math.cos(cam.theta)}
    if(keys['a']||keys['arrowleft'])  {_moveDir.x-=Math.cos(cam.theta);_moveDir.z+=Math.sin(cam.theta)}
    if(keys['d']||keys['arrowright']) {_moveDir.x+=Math.cos(cam.theta);_moveDir.z-=Math.sin(cam.theta)}

    // Mobile joystick
    if(Math.abs(mobileJoystickInput.x)>0.1||Math.abs(mobileJoystickInput.y)>0.1){
      _moveDir.x += -Math.sin(cam.theta)*(-mobileJoystickInput.y) + -Math.cos(cam.theta)*mobileJoystickInput.x;
      _moveDir.z += -Math.cos(cam.theta)*(-mobileJoystickInput.y) + Math.sin(cam.theta)*mobileJoystickInput.x;
    }

    _moveDir.normalize();

    if(_moveDir.length()>0.01){
      const targetAngle = Math.atan2(_moveDir.x,_moveDir.z);
      player.facingAngle = lerpAngle(player.facingAngle,targetAngle,0.15);
      player.isMoving = true;
    }else{
      player.isMoving = false;
    }

    player.vel.x += _moveDir.x*CFG.player.speed;
    player.vel.z += _moveDir.z*CFG.player.speed;
  }

  player.vel.x *= CFG.player.friction;
  player.vel.z *= CFG.player.friction;

  // Gravity
  player.vel.y -= CFG.player.gravity;

  // Jump
  if((keys[' ']||keys['Space'])&&player.onGround){
    player.vel.y = CFG.player.jumpVel;
    player.onGround = false;
  }
  // Glide
  if((keys[' ']||keys['Space'])&&!player.onGround&&player.vel.y<CFG.player.glideVel){
    player.vel.y = CFG.player.glideVel;
  }

  // Apply velocity
  player.pos.x += player.vel.x;
  player.pos.y += player.vel.y;
  player.pos.z += player.vel.z;

  // Ground collision
  const groundY = getTerrainY(player.pos.x,player.pos.z);
  if(groundY<-50){
    // Fell off — respawn
    player.pos.set(0,5,0);
    player.vel.set(0,0,0);
  }else if(player.pos.y<=groundY){
    if(!player.onGround&&player.wasAirborne){
      player.landSquash = 1;
    }
    player.pos.y = groundY;
    player.vel.y = 0;
    player.wasAirborne = !player.onGround && player.vel.y<-0.05;
    player.onGround = true;
  }else{
    player.wasAirborne = true;
    player.onGround = false;
  }

  // Colliders
  colliders.forEach(c=>{
    const dx = player.pos.x-c.x;
    const dz = player.pos.z-c.z;
    const d = Math.sqrt(dx*dx+dz*dz);
    if(d<c.r&&d>0.01){
      const push = (c.r-d)/d;
      player.pos.x += dx*push;
      player.pos.z += dz*push;
    }
  });

  // Land squash decay
  if(player.landSquash>0) player.landSquash = Math.max(0,player.landSquash-0.08);

  // Update mesh
  if(player.mesh){
    player.mesh.position.copy(player.pos);
    player.mesh.rotation.y = player.facingAngle;
    animateBird(player.mesh,time,player.isMoving,!player.onGround,0,0,0,player.landSquash);
  }

  // ─── CAMERA ───
  cam.smoothPos.lerp(player.pos,CFG.cam.smoothing);

  // Auto-reset camera behind player
  if(player.isMoving&&!cam.isDragging&&performance.now()-cam.lastInput>CFG.cam.autoResetDelay){
    const targetTheta = player.facingAngle + Math.PI;
    cam.theta = lerpAngle(cam.theta,targetTheta,CFG.cam.autoResetLerp);
  }

  const cx = cam.smoothPos.x + cam.dist*Math.sin(cam.theta)*Math.cos(cam.phi);
  const cy = cam.smoothPos.y + cam.dist*Math.sin(cam.phi)+2;
  const cz = cam.smoothPos.z + cam.dist*Math.cos(cam.theta)*Math.cos(cam.phi);
  _camPos.set(cx,cy,cz);
  camera.position.lerp(_camPos,0.1);
  camera.lookAt(cam.smoothPos.x,cam.smoothPos.y+1.5,cam.smoothPos.z);

  // ─── GEMS ───
  gems.forEach((g,i)=>{
    if(g.collected) return;
    g.mesh.rotation.y += 0.02;
    g.mesh.position.y = g.baseY + Math.sin(time*0.5+i)*0.4;
    // Collection check
    const dx = player.pos.x-gemPositions[i].x;
    const dz = player.pos.z-gemPositions[i].z;
    if(Math.sqrt(dx*dx+dz*dz)<2.5) collectGem(i);
  });

  // Gem particles
  if(window._gemParticles){
    window._gemParticles = window._gemParticles.filter(p=>{
      p.life -= 0.03;
      p.mesh.position.add(p.vel);
      p.vel.y -= 0.005;
      p.mesh.material.opacity = p.life;
      if(p.life<=0){scene.remove(p.mesh);return false}
      return true;
    });
  }

  // ─── TRACES ───
  traces.forEach(t=>{
    t.mesh.rotation.y += 0.01;
  });

  // ─── NPCS ───
  updateNPCs(time);

  // ─── REMOTE PLAYERS ───
  updateRemotePlayers(time);

  // ─── ZONE ───
  if(frameCount%30===0){
    const zone = detectZone(player.pos.x,player.pos.z);
    updateZoneHUD(zone);
  }

  // ─── NETWORK ───
  sendMove();

  // ─── RENDER ───
  renderer.render(scene,camera);
}

// ─── INIT ───
buildWorld();
initPlayer();
initGems();
initNPCs();
updateGemHUD();
updatePlayerHUD();
updateStatusHUD();
connectWS();

// Start with noon
gameTime = 0.5;

requestAnimationFrame(animate);
</script>
