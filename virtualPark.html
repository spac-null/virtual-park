<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Virtual Park — Fly</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#87ceeb;font-family:'Courier New',monospace;color:#1a1a2e}
canvas{display:block;cursor:none}

.panel{position:absolute;background:rgba(255,255,255,0.88);border:1px solid rgba(0,100,200,0.2);border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,0.12);padding:8px 12px;font-size:12px;pointer-events:none;z-index:10;color:#1a1a2e}

#hud-score{top:14px;left:14px}
#hud-score .score-val{font-size:22px;color:#0055cc;text-shadow:none;font-weight:bold}
#hud-score .rank{color:#555;font-size:11px;margin-top:2px}
#hud-score .gem-count{color:#777;font-size:10px;margin-top:1px}

#hud-online{top:14px;right:14px;display:flex;align-items:center;gap:6px}
#hud-online .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
#hud-online .dot.on{background:#22aa55;box-shadow:0 0 6px rgba(34,170,85,0.5);animation:pulse 2s infinite}
#hud-online .dot.off{background:#bbb}
#hud-online .player-squares{display:flex;gap:3px;margin-left:4px}
#hud-online .psq{width:7px;height:7px;border-radius:1px;display:inline-block}
#hud-online .name{color:#0055cc;margin-left:4px;font-size:11px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

#alt-bar{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:6px;height:180px;z-index:10;pointer-events:none}
#alt-bar .track{width:100%;height:100%;background:rgba(0,100,200,0.1);border-radius:3px;position:relative;overflow:hidden}
#alt-bar .fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#ff6633,#0099ff 40%,#66ddff);border-radius:3px;transition:height 0.1s}
#alt-bar .marker{position:absolute;right:10px;font-size:9px;color:#999;pointer-events:none}
#alt-bar .marker.top{top:-2px}
#alt-bar .marker.bot{bottom:-2px}

#speed-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:4px;align-items:center;pointer-events:none}
#speed-dots .sd{width:6px;height:6px;border-radius:50%;background:rgba(0,100,200,0.15);transition:background 0.12s}
#speed-dots .sd.active{background:#0077dd;box-shadow:0 0 4px rgba(0,120,220,0.4)}
#speed-dots .pitch-arrow{font-size:10px;margin-left:6px;color:#888}

#gem-radar{position:absolute;bottom:14px;left:14px;width:82px;height:82px;z-index:10;pointer-events:none}
#gem-radar canvas{border-radius:50%;border:1px solid rgba(0,100,200,0.2)}

#zone-flash{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);z-index:15;font-size:20px;font-weight:bold;letter-spacing:3px;opacity:0;transition:opacity 0.15s;pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,0.2)}
#zone-flash.show{opacity:1}

#scoreboard{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;opacity:0;pointer-events:none;transition:opacity 0.2s;min-width:280px}
#scoreboard.visible{opacity:1}
#scoreboard table{width:100%;border-collapse:collapse}
#scoreboard th{text-align:left;padding:5px 10px;border-bottom:1px solid rgba(0,100,200,0.25);color:#0055cc;font-weight:400;font-size:11px;text-transform:uppercase;letter-spacing:1px}
#scoreboard td{padding:3px 10px;border-bottom:1px solid rgba(0,0,0,0.06);font-size:12px}
#scoreboard .you{color:#0055cc;font-weight:bold}

#controls-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;opacity:0;pointer-events:none;transition:opacity 0.2s;min-width:260px}
#controls-overlay.visible{opacity:1}
#controls-overlay table{width:100%;border-collapse:collapse}
#controls-overlay td{padding:3px 10px;font-size:12px;border-bottom:1px solid rgba(0,0,0,0.06)}
#controls-overlay td:first-child{color:#0055cc;text-align:right;white-space:nowrap;width:80px}

#hint{position:absolute;bottom:14px;right:14px;font-size:10px;color:#888;z-index:10;pointer-events:none}

#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;pointer-events:none;width:18px;height:18px}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(0,0,0,0.2)}
#crosshair::before{width:1px;height:100%;left:50%;top:0}
#crosshair::after{width:100%;height:1px;top:50%;left:0}

#mobile-joy{position:absolute;bottom:30px;left:30px;z-index:15;width:110px;height:110px;display:none;pointer-events:auto}
#joy-base{width:110px;height:110px;border-radius:50%;background:rgba(0,100,200,0.1);border:2px solid rgba(0,100,200,0.3)}
#joy-thumb{position:absolute;top:50%;left:50%;width:40px;height:40px;margin:-20px 0 0 -20px;border-radius:50%;background:rgba(0,100,200,0.2);border:1px solid rgba(0,100,200,0.4)}
#mobile-flap{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:15;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.7);border:2px solid rgba(0,100,200,0.3);display:none;pointer-events:auto;font-size:10px;line-height:60px;text-align:center;color:rgba(0,100,200,0.7);text-transform:uppercase;letter-spacing:1px}
@media(hover:none)and(pointer:coarse){
  #mobile-joy,#mobile-flap{display:block}
  #hint{display:none}
  #crosshair{display:none}
}

.name-label{position:absolute;z-index:8;pointer-events:none;font-family:'Courier New',monospace;font-size:10px;color:#1a1a2e;text-shadow:0 1px 2px rgba(255,255,255,0.8);white-space:nowrap;transform:translate(-50%,-100%)}
</style>
</head>
<body>

<div id="hud-score" class="panel">
  <div class="score-val">&#9672; 0 pts</div>
  <div class="rank">#- / -</div>

</div>

<div id="hud-online" class="panel">
  <span class="dot off"></span>
  <span class="status">offline</span>
  <span class="player-squares"></span>

</div>

<div id="alt-bar">
  <div class="track"><div class="fill" style="height:50%"></div></div>
  <div class="marker top">60</div>
  <div class="marker bot">6</div>
</div>

<div id="speed-dots">
  <div class="sd"></div><div class="sd"></div><div class="sd"></div><div class="sd"></div><div class="sd"></div>

<div id="gem-radar"><canvas id="radar-canvas" width="82" height="82"></canvas></div>

  <table><thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead><tbody id="sb-body"></tbody></table>

<div id="controls-overlay" class="panel">

<script type="importmap">{"imports":{"three":"https://esm.sh/three@0.167.0","three/addons/":"https://esm.sh/three@0.167.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';

// ── CONFIG ──────────────────────────────────────────────
const CFG = {
  ws: 'wss://park.jaschablume.nl',
  sendRate: 100,
  worldRadius: 90,
  spawnY: 25,
  floorY: 6,
  ceilY: 60,
  fogColor: 0x87ceeb,
  fogDensity: 0.007,
  gemTypes: [
    { name: 'common', color: 0x00ffff, points: 1, count: 8, freq: 880,  respawn: 400  },
    { name: 'rare',   color: 0xff00ff, points: 3, count: 3, freq: 1108, respawn: 1200 },
    { name: 'epic',   color: 0xffd700, points: 5, count: 1, freq: 1480, respawn: 2500 }
  ],
  winScore: 30,
  npcCount: 8,
  rockCount: 20,
  driftCount: 30,
  starCount: 120,
  pillarCount: 8,
  auroraCount: 6
};

// ── UTILS ───────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp  = (a, b, t) => a + (b - a) * Math.min(t, 1);
const rand  = (a, b) => a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const pick  = a => a[Math.floor(Math.random() * a.length)];

const adjectives = ['swift','dark','bright','keen','wild','bold','sharp','cold','grim','pale',
                    'ghost','ash','storm','drift','dusk','dawn','iron','flame','void','frost'];
const nouns = ['hawk','crow','kite','swift','raven','tern','heron','owl','crane','wren',
               'finch','lark','egret','falcon','osprey','jay','gull','dove','merlin','shrike'];

let playerName = localStorage.getItem('vp_playerName');
if (!playerName) {
  playerName = pick(adjectives) + '-' + pick(nouns);
  localStorage.setItem('vp_playerName', playerName);
}

// ── RENDERER & SCENE ────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(CFG.fogColor);
scene.fog = new THREE.FogExp2(CFG.fogColor, CFG.fogDensity);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.5, 200);
camera.position.set(0, CFG.spawnY + 3, 12);

// ── LIGHTING ────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xd4eeff, 1.2));

const dirLight = new THREE.DirectionalLight(0xfff5cc, 2.2);
dirLight.position.set(40, 60, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.far = 150;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

scene.add(new THREE.HemisphereLight(0x87ceeb, 0xd4c89a, 0.8));

// ── MATERIALS ───────────────────────────────────────────
const rockMat = new THREE.MeshStandardMaterial({ color: 0xe8d5a3, metalness: 0.05, roughness: 0.85 });
const edgeMat = new THREE.LineBasicMaterial({ color: 0xb89a6a, opacity: 0.7, transparent: true });

// ── WORLD BUILDER ───────────────────────────────────────
const rocks = [];
const archZones = [];
const slabSurfaces = [];
const caveZones = [];

function addRockMesh(geo, pos, rot, scl) {
  const m = new THREE.Mesh(geo, rockMat);
  m.position.copy(pos);
  if (rot) m.rotation.copy(rot);
  if (scl) m.scale.copy(scl);
  m.castShadow = true;
  m.receiveShadow = true;
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat));
  scene.add(m);
  return m;
}

function randRockPos() {
  let p;
  do { p = new THREE.Vector3(rand(-68, 68), rand(10, 55), rand(-68, 68)); }
  while (p.length() < 14);
  return p;
}

function buildArch(pos) {
  const h = rand(10, 16), w = rand(6, 10), thick = rand(1.5, 3);
  const lp = pos.clone(); lp.x -= w / 2;
  const rp = pos.clone(); rp.x += w / 2;
  const tp = pos.clone(); tp.y += h / 2;
  addRockMesh(new THREE.BoxGeometry(thick, h, thick), lp);
  addRockMesh(new THREE.BoxGeometry(thick, h, thick), rp);
  addRockMesh(new THREE.BoxGeometry(w + thick * 2, thick * 0.7, thick), tp);
  const glow = new THREE.PointLight(0xffee88, 3, 15);
  glow.position.copy(tp); glow.position.y -= 2;
  scene.add(glow);
  archZones.push({
    center: pos.clone(),
    centerY: pos.y + h * 0.25,
    hw: w / 2 + 2.5,
    hh: h / 2 - 1,
    hd: thick + 3
  });
  rocks.push({ type: 'arch', pos });
}

function buildSlab(pos) {
  const w = rand(8, 14), d = rand(6, 10), h = rand(1, 2.5);
  addRockMesh(new THREE.BoxGeometry(w, h, d), pos);
  slabSurfaces.push({ center: pos.clone(), hw: w / 2, hd: d / 2, top: pos.y + h / 2 });
  rocks.push({ type: 'slab', pos });
}

function buildCave(pos) {
  const len = rand(14, 22), w = rand(5, 8), h = rand(5, 7), thick = rand(1.5, 2.5);
  const rot = new THREE.Euler(0, rand(0, Math.PI * 2), 0);
  const lp = pos.clone(); lp.x -= w / 2;
  const rp = pos.clone(); rp.x += w / 2;
  const tp = pos.clone(); tp.y += h / 2;
  addRockMesh(new THREE.BoxGeometry(thick, h, len), lp, rot);
  addRockMesh(new THREE.BoxGeometry(thick, h, len), rp, rot);
  addRockMesh(new THREE.BoxGeometry(w + thick * 2, thick, len), tp, rot);
  const glow = new THREE.PointLight(0xff9933, 2, 12);
  glow.position.copy(pos);
  scene.add(glow);
  caveZones.push({ center: pos.clone(), hw: w / 2, hh: h / 2, len: len / 2, rotY: rot.y });
  rocks.push({ type: 'cave', pos });
}

function buildSpireCluster(pos) {
  const n = randInt(3, 7);
  for (let i = 0; i < n; i++) {
    const h = rand(4, 14), w = rand(0.8, 2.5);
    const sp = pos.clone();
    sp.x += rand(-3, 3); sp.z += rand(-3, 3); sp.y += rand(-2, 2);
    const rot = new THREE.Euler(rand(-0.15, 0.15), rand(0, Math.PI), rand(-0.15, 0.15));
    addRockMesh(new THREE.BoxGeometry(w, h, w), sp, rot);
  }
  rocks.push({ type: 'spire', pos });
}

// Place formations
for (let i = 0; i < 5; i++) buildArch(randRockPos());
for (let i = 0; i < 8; i++) buildSpireCluster(randRockPos());
for (let i = 0; i < 4; i++) buildSlab(randRockPos());
for (let i = 0; i < 3; i++) buildCave(randRockPos());

// Drift stones — small sandy pebbles
const driftStones = [];
for (let i = 0; i < CFG.driftCount; i++) {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(rand(0.2, 0.5), 5, 4),
    new THREE.MeshStandardMaterial({ color: 0xd4c090, roughness: 0.95 })
  );
  m.position.set(rand(-70, 70), rand(8, 55), rand(-70, 70));
  const spd = rand(0.1, 0.4), ph = rand(0, Math.PI * 2);
  driftStones.push({ mesh: m, speed: spd, phase: ph });
  scene.add(m);
}

// Fluffy clouds (replace auroras) — white box clusters
const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, metalness: 0 });
for (let i = 0; i < 18; i++) {
  const cx = rand(-80, 80), cy = rand(12, 52), cz = rand(-80, 80);
  const nc = randInt(3, 7);
  for (let j = 0; j < nc; j++) {
    const w = rand(6, 18), h = rand(3, 7), d = rand(6, 16);
    const cm = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), cloudMat);
    cm.position.set(cx + rand(-8, 8), cy + rand(-2, 3), cz + rand(-8, 8));
    scene.add(cm);
  }
}

// Warm sun shafts at rock landmark positions
for (let i = 0; i < CFG.pillarCount; i++) {
  const p = new THREE.Vector3(rand(-60, 60), 0, rand(-60, 60));
  if (p.length() < 15) p.normalize().multiplyScalar(20);
  for (let j = 0; j < 4; j++) {
    const pl = new THREE.PointLight(0xfff0aa, 1.2, 20);
    pl.position.set(p.x, 12 + j * 10, p.z);
    scene.add(pl);
  }
}

// ── BIRD MESH ───────────────────────────────────────────
function createBirdMesh(color) {
  const group = new THREE.Group();
  const bc = new THREE.Color(color);
  const hc = bc.clone().lerp(new THREE.Color(0xffffff), 0.3);
  const bodyMat = new THREE.MeshStandardMaterial({ color: bc, metalness: 0.15, roughness: 0.7 });
  const headMat = new THREE.MeshStandardMaterial({ color: hc, metalness: 0.15, roughness: 0.7 });
  const beakMat = new THREE.MeshStandardMaterial({ color: 0xf59e0b, metalness: 0.2, roughness: 0.5 });

  // body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 1.6), bodyMat);
  body.castShadow = true;
  group.add(body);
  group.userData.body = body;
  group.userData.bodyMat = bodyMat;

  // head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.5, 0.6), headMat);
  head.position.set(0, 0.32, 0.65);
  head.castShadow = true;
  group.add(head);

  // beak
  const beak = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.5), beakMat);
  beak.position.set(0, 0.2, 0.95);
  group.add(beak);

  // eyes
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const glintMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 4), eyeMat);
  eyeL.position.set(-0.2, 0.42, 0.85);
  group.add(eyeL);
  const eyeR = eyeL.clone(); eyeR.position.x = 0.2; group.add(eyeR);
  const glL = new THREE.Mesh(new THREE.SphereGeometry(0.025, 4, 3), glintMat);
  glL.position.set(-0.19, 0.44, 0.87);
  group.add(glL);
  const glR = glL.clone(); glR.position.x = 0.19; group.add(glR);

  // wings
  function makeWing(side) {
    const wg = new THREE.Group();
    const inner = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.65), bodyMat);
    inner.position.set(side * 0.6, 0, 0);
    inner.castShadow = true;
    wg.add(inner);
    const outer = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.08, 0.45), bodyMat);
    outer.position.set(side * 1.5, 0, 0.15);
    outer.castShadow = true;
    wg.add(outer);
    wg.position.set(side * 0.5, 0, 0.1);
    wg.userData.outer = outer;
    return wg;
  }
  const lw = makeWing(-1), rw = makeWing(1);
  group.add(lw); group.add(rw);
  group.userData.leftWing = lw;
  group.userData.rightWing = rw;

  // tail
  const tailG = new THREE.Group();
  for (let i = -1; i <= 1; i++) {
    const t = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.06, 0.5), bodyMat);
    t.position.set(i * 0.15, 0, -0.3);
    t.rotation.y = i * 0.15;
    tailG.add(t);
  }
  tailG.position.set(0, 0.05, -0.8);
  group.add(tailG);
  group.userData.tail = tailG;

  return group;
}

// ── PLAYER STATE ────────────────────────────────────────
const player = {
  mesh: null,
  score: 0,
  gems: 0,
  vel: new THREE.Vector3(),
  facing: new THREE.Vector3(0, 0, -1),
  speed: 3,
  pitchAngle: 0,
  bankAngle: 0,
  flapTimer: 0,
  isFlapping: false,
  flapAnim: 0,
  hitFlash: 0,
  color: 0x00b3ff,
  name: playerName
};

player.mesh = createBirdMesh(player.color);
player.mesh.position.set(0, CFG.spawnY, 0);
scene.add(player.mesh);

// ── INPUT ───────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  keys[e.key] = true;
  if (e.code === 'Tab') {
    e.preventDefault();
    document.getElementById('scoreboard').classList.add('visible');
  }
  if (e.key === '?' || e.key === '/') {
    document.getElementById('controls-overlay').classList.toggle('visible');
  }
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
  keys[e.key] = false;
  if (e.code === 'Tab') {
    document.getElementById('scoreboard').classList.remove('visible');
  }
});

// right-drag free look
let mouseRightDown = false, freeLookYaw = 0, freeLookPitch = 0;
renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
renderer.domElement.addEventListener('mousedown', e => { if (e.button === 2) mouseRightDown = true; });
window.addEventListener('mouseup', e => {
  if (e.button === 2) { mouseRightDown = false; freeLookYaw = 0; freeLookPitch = 0; }
});
window.addEventListener('mousemove', e => {
  if (mouseRightDown) {
    freeLookYaw -= e.movementX * 0.003;
    freeLookPitch -= e.movementY * 0.003;
    freeLookPitch = clamp(freeLookPitch, -0.8, 0.8);
  }
});

// mobile joystick
let joyX = 0, joyY = 0, mobileFlap = false;
const joyBase = document.getElementById('joy-base');
const joyThumb = document.getElementById('joy-thumb');
if (joyBase) {
  let joyActive = false;
  const maxR = 40;
  function joyMove(cx, cy) {
    const rect = joyBase.getBoundingClientRect();
    const dx = cx - rect.left - 55, dy = cy - rect.top - 55;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const clamped = Math.min(dist, maxR);
    const angle = Math.atan2(dy, dx);
    const fx = Math.cos(angle) * clamped, fy = Math.sin(angle) * clamped;
    joyThumb.style.marginLeft = (fx - 20) + 'px';
    joyThumb.style.marginTop = (fy - 20) + 'px';
    joyX = fx / maxR;
    joyY = fy / maxR;
  }
  joyBase.addEventListener('touchstart', e => {
    e.preventDefault(); joyActive = true;
    joyMove(e.touches[0].clientX, e.touches[0].clientY);
  });
  window.addEventListener('touchmove', e => {
    if (joyActive && e.touches.length > 0) joyMove(e.touches[0].clientX, e.touches[0].clientY);
  });

const gems = [];
const gemLightPool = [];
for (let i = 0; i < 12; i++) {
  const l = new THREE.PointLight(0xffffff, 0, 10);
  l.visible = false;
  scene.add(l);
  gemLightPool.push(l);
}
let gemLightIdx = 0;

function getGemLight(color) {
  const l = gemLightPool[gemLightIdx % 12];
  l.color.set(color);
  l.intensity = 4;
  l.visible = true;
  gemLightIdx++;
  return l;
}

function spawnGem(typeIdx) {
  const t = CFG.gemTypes[typeIdx];
  const mesh = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.7),
    new THREE.MeshStandardMaterial({
      color: t.color, metalness: 1.0, roughness: 0.0,
      emissive: t.color, emissiveIntensity: 0.8
    })
  );
  let pos;
  do { pos = new THREE.Vector3(rand(-65, 65), rand(10, 50), rand(-65, 65)); }
  while (pos.length() < 10 || gems.some(g => g.mesh.position.distanceTo(pos) < 8));
  mesh.position.copy(pos);
  scene.add(mesh);

  const light = getGemLight(t.color);
  light.position.copy(pos);

  const gem = { mesh, light, type: typeIdx, active: true, phase: rand(0, 6), beam: null };

  if (typeIdx === 2) {
    const beam = new THREE.PointLight(0xffd700, 6, 30);
    beam.position.copy(pos);
    beam.position.y -= 3;
    scene.add(beam);
    gem.beam = beam;
  }

  gems.push(gem);
}

function initGems() {
  CFG.gemTypes.forEach((t, i) => {
    for (let j = 0; j < t.count; j++) spawnGem(i);
  });
}

// particles
const particles = [];
const MAX_PARTICLES = 60;
function burstParticles(pos, color) {
  if (particles.length >= MAX_PARTICLES) return; // cap — don't spawn if already busy
  for (let i = 0; i < 10; i++) {
    const m = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.2),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
    );
    m.position.copy(pos);
    const v = new THREE.Vector3(rand(-1, 1), rand(-1, 1), rand(-1, 1)).normalize().multiplyScalar(rand(3, 7));
    scene.add(m);
    particles.push({ mesh: m, vel: v, life: 0.5 });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.addScaledVector(p.vel, dt);
    p.life -= dt;
    p.mesh.material.opacity = Math.max(0, p.life / 0.5);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      particles.splice(i, 1);
    }
  }
}

// ── AUDIO ───────────────────────────────────────────────
let audioCtx = null, masterGain = null, windGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;
  masterGain.connect(audioCtx.destination);

  // drone
  const droneGain = audioCtx.createGain();
  droneGain.gain.value = 0.08;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 400;
  const d1 = audioCtx.createOscillator(); d1.type = 'sine'; d1.frequency.value = 55; d1.detune.value = -3;
  const d2 = audioCtx.createOscillator(); d2.type = 'sine'; d2.frequency.value = 55; d2.detune.value = 3;
  d1.connect(lp); d2.connect(lp); lp.connect(droneGain); droneGain.connect(masterGain);
  d1.start(); d2.start();

  // wind noise
  const bufSize = 4096;
  const noiseNode = audioCtx.createScriptProcessor(bufSize, 1, 1);
  noiseNode.onaudioprocess = e => {
    const o = e.outputBuffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) o[i] = Math.random() * 2 - 1;
  };
  const windFilter = audioCtx.createBiquadFilter();
  windFilter.type = 'highpass';
  windFilter.frequency.value = 800;
  windGain = audioCtx.createGain();
  windGain.gain.value = 0;
  noiseNode.connect(windFilter);
  windFilter.connect(windGain);
  windGain.connect(masterGain);
}

function playFlap() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 100;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.1);
}

function playGemCollect(freq) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t + 0.2);
}

function playArchBonus() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o1 = audioCtx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 660;
  const g1 = audioCtx.createGain();
  g1.gain.setValueAtTime(0.15, t);
  g1.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  o1.connect(g1); g1.connect(masterGain); o1.start(t); o1.stop(t + 0.1);
  const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 880;
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.15, t + 0.08);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
  o2.connect(g2); g2.connect(masterGain); o2.start(t + 0.08); o2.stop(t + 0.2);
}

// ── NPC BIRDS (boids) ───────────────────────────────────
const npcBirds = [];
const npcColors = [0x8B6914, 0x6B3A2E, 0x4A5568, 0x5C4033, 0x7B6B4F, 0x3D4F5F, 0x6E5B3A, 0x4F6D5B];

for (let i = 0; i < CFG.npcCount; i++) {
  const a = rand(0, Math.PI * 2), r = rand(20, 55);
  const mat = new THREE.MeshStandardMaterial({ color: npcColors[i], roughness: 0.8 });

  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.4, 1.2), mat);
  body.castShadow = true; g.add(body);
  const lw = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.08, 0.5), mat);
  lw.position.set(-0.8, 0, 0); g.add(lw);
  const rw = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.08, 0.5), mat);
  rw.position.set(0.8, 0, 0); g.add(rw);

  const pos = new THREE.Vector3(Math.cos(a) * r, rand(18, 42), Math.sin(a) * r);
  g.position.copy(pos);
  scene.add(g);

  npcBirds.push({
    pos,
    vel: new THREE.Vector3(rand(-0.5, 0.5), 0, rand(-0.5, 0.5)),
    wingPhase: rand(0, 6),
    group: g, lw, rw
  });
}

const _boidVec = new THREE.Vector3();

function updateNPCs(dt) {
  const pp = player.mesh.position;
  for (let i = 0; i < npcBirds.length; i++) {
    const b = npcBirds[i];
    let cohX = 0, cohY = 0, cohZ = 0, sepX = 0, sepY = 0, sepZ = 0, aliX = 0, aliZ = 0, nc = 0;
    for (let j = 0; j < npcBirds.length; j++) {
      if (i === j) continue;
      const o = npcBirds[j];
      const dx = o.pos.x - b.pos.x, dy = o.pos.y - b.pos.y, dz = o.pos.z - b.pos.z;
      const d2 = dx * dx + dy * dy + dz * dz;
      if (d2 < 400) { cohX += o.pos.x; cohY += o.pos.y; cohZ += o.pos.z; aliX += o.vel.x; aliZ += o.vel.z; nc++; }
      if (d2 < 16 && d2 > 0.01) { const f = 1 / Math.sqrt(d2); sepX -= dx * f; sepY -= dy * f; sepZ -= dz * f; }
    }
    if (nc > 0) {
      cohX = cohX / nc - b.pos.x; cohY = cohY / nc - b.pos.y; cohZ = cohZ / nc - b.pos.z;
      aliX /= nc; aliZ /= nc;
    }

    b.vel.x += cohX * 0.003 + sepX * 0.08 + aliX * 0.01;
    b.vel.y += cohY * 0.003 + sepY * 0.08;
    b.vel.z += cohZ * 0.003 + sepZ * 0.08 + aliZ * 0.01;

    // scatter from player (stronger)
    _boidVec.copy(b.pos).sub(pp);
    const pDist = _boidVec.length();
    if (pDist < 10) b.vel.addScaledVector(_boidVec.normalize(), (5 / Math.max(pDist, 1)) * dt * 8);

    // chase nearest active gem occasionally (every 3rd NPC, adds competition)
    if (i % 3 === 0) {
      let bestGem = null, bestD2 = 900;
      for (let gi = 0; gi < gems.length; gi++) {
        if (!gems[gi].active) continue;
        const d2 = b.pos.distanceToSquared(gems[gi].mesh.position);
        if (d2 < bestD2) { bestD2 = d2; bestGem = gems[gi]; }
      }
      if (bestGem) {
        _boidVec.copy(bestGem.mesh.position).sub(b.pos).normalize();
        b.vel.addScaledVector(_boidVec, 1.5 * dt);
      }
    }

    // orbit center
    _boidVec.copy(b.pos).negate().normalize();
    b.vel.addScaledVector(_boidVec, 0.15 * dt);

    // altitude bounds
    if (b.pos.y < 15) b.vel.y += 2 * dt;
    if (b.pos.y > 45) b.vel.y -= 2 * dt;
    if (b.pos.length() > 70) {
      _boidVec.copy(b.pos).negate().normalize();
      b.vel.addScaledVector(_boidVec, 2 * dt);
    }

    const spd = b.vel.length();
    if (spd > 5) b.vel.multiplyScalar(5 / spd);
    b.pos.addScaledVector(b.vel, dt);
    b.group.position.copy(b.pos);

    if (spd > 0.1) b.group.rotation.y = Math.atan2(-b.vel.x, -b.vel.z);
    b.wingPhase += dt * 5;
    const wa = Math.sin(b.wingPhase) * 0.35;
    b.lw.rotation.z = wa;
    b.rw.rotation.z = -wa;
  }
}

const remotePlayers = {};
const remoteLabels = {};

function getRemotePlayer(id, name, color) {
  if (remotePlayers[id]) return remotePlayers[id];
  const mesh = createBirdMesh(color);
  scene.add(mesh);
  const label = document.createElement('div');
  label.className = 'name-label';
  label.textContent = name || 'bird';
  document.body.appendChild(label);
  const rp = {
    mesh, name, color, score: 0,
    targetPos: new THREE.Vector3(0, CFG.spawnY, 0),
    targetRotY: 0, wingPhase: 0
  };
  remotePlayers[id] = rp;
  remoteLabels[id] = label;
  return rp;
}

function removeRemotePlayer(id) {
  if (remotePlayers[id]) { scene.remove(remotePlayers[id].mesh); delete remotePlayers[id]; }
  if (remoteLabels[id]) { remoteLabels[id].remove(); delete remoteLabels[id]; }
}

function parseColor(c) {
  if (!c) return 0x888888;
  if (typeof c === 'number') return c;
  return parseInt(String(c).replace('#', ''), 16) || 0x888888;
}

function updateBirdColor(mesh, color) {
  const c = new THREE.Color(color);
  const hc = c.clone().lerp(new THREE.Color(0xffffff), 0.3);
  mesh.userData.body.material.color.copy(c);
  mesh.userData.leftWing.children.forEach(ch => { if (ch.material) ch.material.color.copy(c); });
  mesh.userData.rightWing.children.forEach(ch => { if (ch.material) ch.material.color.copy(c); });
}

let ws = null, wsConnected = false, myId = null;

function connectWS() {
  try { ws = new WebSocket(CFG.ws); } catch (e) { setTimeout(connectWS, 5000); return; }
  ws.onopen = () => { wsConnected = true; };
  ws.onclose = () => { wsConnected = false; setTimeout(connectWS, 5000); };
  ws.onerror = () => {};
  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === 'welcome') {
      myId = msg.id;
      player.color = parseColor(msg.color);
      updateBirdColor(player.mesh, player.color);
      if (msg.players) {
        for (const p of msg.players) {
          const rp = getRemotePlayer(p.id, p.name, parseColor(p.color));
          rp.targetPos.set(p.x || 0, p.y || CFG.spawnY, p.z || 0);
          rp.targetRotY = p.rotY || 0;
          rp.score = p.score || 0;
          rp.name = p.name || 'bird';
        }
      }
    } else if (msg.type === 'join') {
      getRemotePlayer(msg.id, msg.name, parseColor(msg.color));
    } else if (msg.type === 'update') {
      if (msg.id === myId) return;
      const rp = getRemotePlayer(msg.id, msg.name, parseColor(msg.color));
      rp.targetPos.set(msg.x || 0, msg.y || CFG.spawnY, msg.z || 0);
      rp.targetRotY = msg.rotY || 0;
      rp.score = msg.score || 0;
      if (msg.name) rp.name = msg.name;
    } else if (msg.type === 'leave') {
      removeRemotePlayer(msg.id);
    } else if (msg.type === 'trace') {
      addTrace(msg.x || 0, msg.z || 0, msg.y || CFG.spawnY, msg.text || '');
    }
  };
}

let lastSend = 0;
function sendMove() {
  if (!ws || ws.readyState !== 1) return;
  const now = performance.now();
  if (now - lastSend < CFG.sendRate) return;
  lastSend = now;
  const p = player.mesh.position;
  ws.send(JSON.stringify({
    type: 'move',
    x: +p.x.toFixed(2),
    z: +p.z.toFixed(2),
    y: +p.y.toFixed(2),
    rotY: +player.mesh.rotation.y.toFixed(3),
    name: playerName,
    score: player.score
  }));
}

function updateHUD(dt) {
  scoreEl.textContent = '\u25C8 ' + player.score + ' pts';
  gemCountEl.textContent = player.gems + ' gems';

  const allPlayers = [{ name: playerName, score: player.score, me: true }];
  for (const id in remotePlayers) {
    allPlayers.push({ name: remotePlayers[id].name || 'bird', score: remotePlayers[id].score || 0, me: false });
  }
  allPlayers.sort((a, b) => b.score - a.score);
  const myRank = allPlayers.findIndex(p => p.me) + 1;
  rankEl.textContent = '#' + myRank + ' / ' + allPlayers.length;

  // altitude bar
  const altPct = clamp((player.mesh.position.y - CFG.floorY) / (CFG.ceilY - CFG.floorY), 0, 1) * 100;
  altFill.style.height = altPct + '%';
  altFill.style.boxShadow = altPct < 15 ? '0 0 6px #ff4444' : 'none';

  // speed dots
  const spdPct = clamp(player.speed / 28, 0, 1);
  const activeDots = Math.round(spdPct * 10);
  speedDots.forEach((d, i) => d.classList.toggle('active', i < activeDots));
  pitchArrow.textContent = player.pitchAngle < -0.1 ? '\u2191' : player.pitchAngle > 0.1 ? '\u2193' : '\u2192';

  // zone flash timer
  if (zoneFlashTimer > 0) {
    zoneFlashTimer -= dt;
    if (zoneFlashTimer <= 0) zoneFlash.classList.remove('show');
  }

  // radar
  radarCtx.clearRect(0, 0, 82, 82);
  radarCtx.fillStyle = 'rgba(200,230,255,0.75)';
  radarCtx.beginPath(); radarCtx.arc(41, 41, 40, 0, Math.PI * 2); radarCtx.fill();
  radarCtx.strokeStyle = 'rgba(0,100,200,0.15)';
  radarCtx.lineWidth = 1; radarCtx.stroke();
  radarCtx.strokeStyle = 'rgba(0,100,200,0.08)';
  radarCtx.beginPath(); radarCtx.arc(41, 41, 20, 0, Math.PI * 2); radarCtx.stroke();

  const pp = player.mesh.position;
  const ry = -player.mesh.rotation.y;

  // gem dots on radar
  for (let gi = 0; gi < gems.length; gi++) {
    const g = gems[gi];
    if (!g.active) continue;
    const dx = g.mesh.position.x - pp.x, dz = g.mesh.position.z - pp.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist > 30) continue;
    const rx = dx * Math.cos(ry) - dz * Math.sin(ry);
    const rz = dx * Math.sin(ry) + dz * Math.cos(ry);
    const sx = 41 + rx / 30 * 38, sy = 41 + rz / 30 * 38;
    radarCtx.fillStyle = '#' + CFG.gemTypes[g.type].color.toString(16).padStart(6, '0');
    radarCtx.fillRect(sx - 2, sy - 2, 4, 4);
  }

  // player dots on radar
  for (const id in remotePlayers) {
    const rp = remotePlayers[id];
    const dx = rp.targetPos.x - pp.x, dz = rp.targetPos.z - pp.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist > 30) continue;
    const rx = dx * Math.cos(ry) - dz * Math.sin(ry);
    const rz = dx * Math.sin(ry) + dz * Math.cos(ry);
    const sx = 41 + rx / 30 * 38, sy = 41 + rz / 30 * 38;
    radarCtx.fillStyle = '#1a1a2e';
    radarCtx.fillRect(sx - 1.5, sy - 1.5, 3, 3);
  }

  // center dot
  radarCtx.fillStyle = '#0055cc';
  radarCtx.fillRect(39.5, 39.5, 3, 3);

  // scoreboard
  let sbHTML = '';
  allPlayers.forEach((p, i) => {
    sbHTML += '<tr class="' + (p.me ? 'you' : '') + '"><td>' + (i + 1) + '</td><td>' + p.name + '</td><td>' + p.score + '</td></tr>';
  });
  sbBody.innerHTML = sbHTML;
}

function updateRemotePlayers(dt) {
  const projVec = new THREE.Vector3();
  for (const id in remotePlayers) {
    const rp = remotePlayers[id];
    rp.mesh.position.lerp(rp.targetPos, 6 * dt);
    rp.mesh.rotation.y = lerp(rp.mesh.rotation.y, rp.targetRotY, 6 * dt);
    rp.wingPhase += dt * 4;
    const wa = Math.sin(rp.wingPhase) * 0.2;
    rp.mesh.userData.leftWing.rotation.z = wa;
    rp.mesh.userData.rightWing.rotation.z = -wa;

    // name labels
    projVec.copy(rp.mesh.position);
    projVec.y += 1.8;
    projVec.project(camera);
    const label = remoteLabels[id];
    if (label) {
      if (projVec.z > 1 || projVec.z < -1) {
        label.style.display = 'none';
      } else {
        label.style.display = 'block';
        label.style.left = ((projVec.x + 1) / 2 * window.innerWidth) + 'px';
        label.style.top = ((-projVec.y + 1) / 2 * window.innerHeight) + 'px';
        label.textContent = (rp.name || 'bird') + ' [' + (rp.score || 0) + ']';
      }
    }
  }
}

// ── PRE-ALLOCATED TEMP VECTORS ──────────────────────────
const _tv1 = new THREE.Vector3();
const _tv2 = new THREE.Vector3();
const _camEuler = new THREE.Euler();

// ── CAMERA STATE ─────────────────────────────────────────
// Smooth yaw prevents shake when bird turns sharply
const camState = {
  yaw: 0,          // lagged behind player.mesh.rotation.y
  smoothPos: new THREE.Vector3(0, CFG.spawnY, 0)
};

// ── ARCH COLLISION COOLDOWNS ────────────────────────────
const archCooldowns = new Float32Array(archZones.length);

// ── CLOCK & INIT ────────────────────────────────────────
const clock = new THREE.Clock();
let firstInteraction = false;

function onFirstInteraction() {
  if (firstInteraction) return;
  firstInteraction = true;
  initAudio();
}
window.addEventListener('click', onFirstInteraction);
window.addEventListener('keydown', onFirstInteraction);
window.addEventListener('touchstart', onFirstInteraction);

initGems();
connectWS();

// ── GAME LOOP ───────────────────────────────────────────
let _frameCount = 0;
function animate() {
  requestAnimationFrame(animate);
  _frameCount++;
  let dt = clock.getDelta();
  dt = Math.min(dt, 0.05);
  const time = clock.elapsedTime;

  // ── FLIGHT PHYSICS ──────────────────────────────────
  const pitchRate = 2.6;
  const yawRate   = 2.0;
  const rollRate  = 3.0;

  // pitch
  if (keys['KeyW'] || keys['ArrowUp'] || joyY < -0.2)
    player.pitchAngle -= pitchRate * dt * (joyY < -0.2 ? Math.abs(joyY) : 1);
  if (keys['KeyS'] || keys['ArrowDown'] || joyY > 0.2)
    player.pitchAngle += pitchRate * dt * (joyY > 0.2 ? joyY : 1);

  // bank
  if (keys['KeyA'] || keys['ArrowLeft'] || joyX < -0.2)
    player.bankAngle -= rollRate * dt * (joyX < -0.2 ? Math.abs(joyX) : 1);
  if (keys['KeyD'] || keys['ArrowRight'] || joyX > 0.2)
    player.bankAngle += rollRate * dt * (joyX > 0.2 ? joyX : 1);

  player.pitchAngle = clamp(player.pitchAngle, -1.0, 1.0);  // steeper dives
  player.bankAngle = lerp(player.bankAngle, 0, 3.5 * dt);   // quicker self-level

  // flap
  if ((keys['Space'] || mobileFlap) && player.flapTimer <= 0) {
    player.vel.y += 8.0;                          // stronger flap punch
    player.speed = Math.max(player.speed, 10);
    player.flapTimer = 0.25;                       // faster repeat flapping
    player.isFlapping = true;
    player.flapAnim = 0.25;
    playFlap();
  }
  player.flapTimer -= dt;
  mobileFlap = false;

  // facing direction from yaw + pitch
  const yaw = player.mesh.rotation.y;
  player.facing.set(
    -Math.sin(yaw) * Math.cos(player.pitchAngle),
    Math.sin(player.pitchAngle),
    -Math.cos(yaw) * Math.cos(player.pitchAngle)
  ).normalize();

  // yaw from bank
  player.mesh.rotation.y -= player.bankAngle * yawRate * dt;

  // speed: dive accelerates, climb decelerates
  player.speed += player.facing.y * -2.5 * dt;
  player.speed -= 1.0 * dt; // air resistance
  player.speed = clamp(player.speed, 0.5, 32);

  // gravity
  player.vel.y -= 6.0 * dt;

  // lift — sustain level flight around speed 8+
  const lift = player.speed * 0.85 + player.pitchAngle * -2.5;
  player.vel.y += lift * dt;

  // forward thrust — ALL 3 axes so pitch actually drives dive/climb
  player.vel.x += player.facing.x * player.speed * 2.5 * dt;
  player.vel.y += player.facing.y * player.speed * 1.8 * dt;  // pitch = vertical thrust
  player.vel.z += player.facing.z * player.speed * 2.5 * dt;

  // drag (all axes)
  player.vel.x *= (1 - 1.6 * dt);
  player.vel.z *= (1 - 1.6 * dt);
  player.vel.y *= (1 - 0.4 * dt);
  player.vel.y = clamp(player.vel.y, -22, 18);

  // move
  _tv1.copy(player.vel).multiplyScalar(dt);
  player.mesh.position.add(_tv1);

  // world bounds — bounce back, don't stick
  const posLen = player.mesh.position.length();
  if (posLen > 85) {
    // Reflect velocity away from boundary and push hard inward
    _tv1.copy(player.mesh.position).normalize();
    const inward = -player.vel.dot(_tv1);
    if (inward < 0) player.vel.addScaledVector(_tv1, -inward * 1.8 + 8);
    player.vel.addScaledVector(_tv1, -12); // strong push toward center
    player.speed *= 0.6;
  }
  if (player.mesh.position.y < CFG.floorY) {
    player.mesh.position.y = CFG.floorY + 0.5;
    player.vel.y = Math.abs(player.vel.y) * 0.5 + 3; // bounce up
    player.pitchAngle = Math.max(player.pitchAngle, -0.2); // nose up
  }
  if (player.mesh.position.y > CFG.ceilY + 5) {
    player.vel.y = -(Math.abs(player.vel.y) * 0.5 + 2); // bounce down
    player.pitchAngle = Math.min(player.pitchAngle, 0.2);
  }

  // ── BIRD COLLISION ───────────────────────────────────
  // vs remote players
  for (const id in remotePlayers) {
    const rp = remotePlayers[id];
    _tv1.copy(player.mesh.position).sub(rp.mesh.position);
    const dist = _tv1.length();
    if (dist < 3.5 && dist > 0.01) {
      const push = 14 * (3.5 - dist) / 3.5;
      _tv1.normalize().multiplyScalar(push);
      player.vel.add(_tv1);
      // Both birds flash white briefly
      if (!player.hitFlash) { player.hitFlash = 0.3; showZoneFlash('💥 bump!', '#ff6600'); }
    }
  }
  // vs NPC birds
  for (let i = 0; i < npcBirds.length; i++) {
    _tv1.copy(player.mesh.position).sub(npcBirds[i].pos);
    const dist = _tv1.length();
    if (dist < 3.0 && dist > 0.01) {
      const push = 10 * (3.0 - dist) / 3.0;
      _tv1.normalize().multiplyScalar(push);
      player.vel.add(_tv1);
      // Scatter the NPC
      npcBirds[i].vel.copy(_tv1).multiplyScalar(-3);
    }
  }
  // Hit flash timer
  if (player.hitFlash > 0) { player.hitFlash -= dt; }

  // ── BIRD MESH ORIENTATION ───────────────────────────
  player.mesh.rotation.z = -player.bankAngle * 0.7;
  if (player.mesh.userData.body) {
    player.mesh.userData.body.rotation.x = player.pitchAngle;
  }

  // wing animation
  if (player.flapAnim > 0) {
    player.flapAnim -= dt;
    const wa = Math.sin(time * 50) * 0.55;
    player.mesh.userData.leftWing.rotation.z = wa;
    player.mesh.userData.rightWing.rotation.z = -wa;
  } else {
    const glide = Math.sin(time * 3) * 0.06;
    player.mesh.userData.leftWing.rotation.z = glide + player.bankAngle * 0.3;
    player.mesh.userData.rightWing.rotation.z = -glide - player.bankAngle * 0.3;
  }

  // swept wings at high speed
  const lwo = player.mesh.userData.leftWing.userData.outer;
  const rwo = player.mesh.userData.rightWing.userData.outer;
  if (lwo && rwo) {
    const tgtSweep = player.speed > 18 ? 0.3 : 0;
    lwo.rotation.y = lerp(lwo.rotation.y, tgtSweep, 5 * dt);
    rwo.rotation.y = lerp(rwo.rotation.y, -tgtSweep, 5 * dt);
  }

  // ghost trail
  for (let i = ghostPositions.length - 1; i > 0; i--) ghostPositions[i].copy(ghostPositions[i - 1]);
  ghostPositions[0].copy(player.mesh.position);
  const showGhosts = player.speed > 15;
  for (let i = 0; i < ghostMeshes.length; i++) {
    ghostMeshes[i].visible = showGhosts;
    ghostMeshes[i].position.copy(ghostPositions[i]);
  }

  // ── CAMERA ──────────────────────────────────────────
  // Lag camera yaw behind bird — prevents shake on sharp turns
  let dyaw = player.mesh.rotation.y - camState.yaw;
  while (dyaw > Math.PI)  dyaw -= Math.PI * 2;
  while (dyaw < -Math.PI) dyaw += Math.PI * 2;
  camState.yaw += dyaw * Math.min(3.5 * dt, 1);

  // Smooth target position (spring-arm, not instant snap)
  camState.smoothPos.lerp(player.mesh.position, Math.min(6 * dt, 1));

  // Camera sits behind+above bird using lagged yaw
  _tv1.set(0, 3, 13);
  _camEuler.set(0, camState.yaw, 0);
  _tv1.applyEuler(_camEuler);
  _tv2.copy(camState.smoothPos).add(_tv1);
  camera.position.lerp(_tv2, Math.min(4 * dt, 1));  // softer follow = no shake

  // Look target: ahead of bird + slight altitude bias from pitch
  if (mouseRightDown) {
    _tv1.copy(player.mesh.position);
    _tv1.x += Math.sin(player.mesh.rotation.y + freeLookYaw) * 7;
    _tv1.z += Math.cos(player.mesh.rotation.y + freeLookYaw) * 7;
    _tv1.y += freeLookPitch * 6 + 1.5;
  } else {
    _tv1.copy(player.mesh.position).addScaledVector(player.facing, 7);
    _tv1.y += 1.5 + player.pitchAngle * 2; // camera tilts with pitch — feels responsive
  }
  camera.lookAt(_tv1);
  // No rotation.z — lookAt handles full orientation cleanly, no fighting

  // ── GEMS UPDATE ─────────────────────────────────────
  for (let gi = 0; gi < gems.length; gi++) {
    const g = gems[gi];
    if (!g.active) continue;

    g.mesh.rotation.y += dt * 1.5;
    g.mesh.rotation.x += dt * 0.7;
    g.mesh.position.y += Math.sin(time * 2 + g.phase) * 0.003;
    if (g.beam) g.beam.intensity = 4 + Math.sin(time * 3) * 3;

    const dist = player.mesh.position.distanceTo(g.mesh.position);
    if (dist < 3.0) {
      const gt = CFG.gemTypes[g.type];
      player.score += gt.points;
      player.gems++;
      burstParticles(g.mesh.position.clone(), gt.color);
      playGemCollect(gt.freq);

      g.active = false;
      g.mesh.visible = false;
      g.light.visible = false;
      if (g.beam) g.beam.visible = false;

      // check cave bonus
      for (let ci = 0; ci < caveZones.length; ci++) {
        const cz = caveZones[ci];
        if (g.mesh.position.distanceTo(cz.center) < cz.len + 5) {
          player.score += 1;
          showZoneFlash('CAVE BONUS!', '#ffd700');
          break;
        }
      }

      // check win condition
      if (player.score >= CFG.winScore) triggerWin(player.name);

      // respawn — faster for common, slower for epic
      const gemRef = g;
      const respawnMs = CFG.gemTypes[g.type].respawn;
      setTimeout(() => {
        let pos;
        do { pos = new THREE.Vector3(rand(-65, 65), rand(10, 50), rand(-65, 65)); }
        while (pos.length() < 10);
        gemRef.mesh.position.copy(pos);
        gemRef.light.position.copy(pos);
        if (gemRef.beam) { gemRef.beam.position.copy(pos); gemRef.beam.position.y -= 3; gemRef.beam.visible = true; }
        gemRef.active = true;
        gemRef.mesh.visible = true;
        gemRef.light.visible = true;
      }, respawnMs);
    }
  }

  // ── ARCH BONUS CHECK ────────────────────────────────
  for (let ai = 0; ai < archZones.length; ai++) {
    if (archCooldowns[ai] > 0) { archCooldowns[ai] -= dt; continue; }
    const az = archZones[ai];
    const pp = player.mesh.position;
    const dx = Math.abs(pp.x - az.center.x);
    const dy = Math.abs(pp.y - az.centerY);
    const dz = Math.abs(pp.z - az.center.z);
    if (dx < az.hw && dy < az.hh && dz < az.hd) {
      player.score += 2;
      archCooldowns[ai] = 5;
      showZoneFlash('ARCH BONUS +2', '#4ade80');
      playArchBonus();
    }
  }

  // ── PARTICLES ───────────────────────────────────────
  updateParticles(dt);

  // ── NPC BIRDS (every 2 frames — 8×boids is cheap but no need at 60fps) ──
  if (_frameCount % 2 === 0) updateNPCs(dt * 2);

  // ── REMOTE PLAYERS ──────────────────────────────────
  updateRemotePlayers(dt);

  // ── AMBIENT ANIMATIONS ──────────────────────────────
  for (let i = 0; i < driftStones.length; i++) {
    const ds = driftStones[i];
    ds.mesh.position.y += Math.sin(time * ds.speed + ds.phase) * 0.002;
  }


  // ── TRACES DECAY ────────────────────────────────────
  for (let i = traces.length - 1; i >= 0; i--) {
    traces[i].life -= dt;
    if (traces[i].life <= 0) {
      scene.remove(traces[i].group);
      traces.splice(i, 1);
    }
  }

  // ── WIND AUDIO ──────────────────────────────────────
  if (windGain) {
    const windVol = clamp(player.speed / 28 * 0.12, 0, 0.12);
    windGain.gain.value = lerp(windGain.gain.value, windVol, 3 * dt);
  }

  // ── NETWORK + HUD ──────────────────────────────────
  sendMove();
  updateHUD(dt);
  updateOnlineHUD();

  // ── RENDER ──────────────────────────────────────────
  renderer.render(scene, camera);
}

animate();

// ── RESIZE ──────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
